<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="pos-config.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Waiting Display - Restaurant POS</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Background animated gradient */
        .bg-animate {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, #0d1f3c 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, #0d2e1a 0%, transparent 50%),
                        #0a0a0a;
            z-index: 0;
        }

        .main-wrap {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 32px;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
        }

        .restaurant-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .top-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .top-clock {
            font-size: 36px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: white;
        }

        .top-date {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(39, 174, 96, 0.15);
            border: 1px solid rgba(39, 174, 96, 0.4);
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            color: #27ae60;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #27ae60;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Main Content */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 0;
            overflow: hidden;
        }

        /* Left: Queue + Now Serving */
        .left-section {
            display: grid;
            grid-template-rows: auto 1fr;
            padding: 24px;
            gap: 20px;
            overflow: hidden;
        }

        /* Now Serving Banner */
        .now-serving-banner {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border-radius: 16px;
            padding: 20px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(243, 156, 18, 0.3);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 8px 32px rgba(243,156,18,0.3); }
            50% { box-shadow: 0 8px 48px rgba(243,156,18,0.6); }
        }

        .now-serving-label {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(0,0,0,0.6);
            margin-bottom: 6px;
        }

        .now-serving-numbers {
            display: flex;
            gap: 16px;
        }

        .serving-number {
            font-size: 52px;
            font-weight: 900;
            color: #000;
            line-height: 1;
        }

        .now-serving-right {
            text-align: right;
        }

        .now-serving-table {
            font-size: 14px;
            color: rgba(0,0,0,0.6);
            margin-bottom: 4px;
        }

        .now-serving-ready {
            font-size: 18px;
            font-weight: 700;
            color: #000;
        }

        /* Queue List */
        .queue-section { overflow: hidden; display: flex; flex-direction: column; }
        .queue-header {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 14px;
        }

        .queue-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .queue-row {
            display: grid;
            grid-template-columns: 80px 1fr 120px 100px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 20px;
            transition: all 0.3s;
            animation: fadeSlide 0.4s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .queue-row.next { border-color: rgba(243,156,18,0.4); background: rgba(243,156,18,0.08); }
        .queue-row.soon { border-color: rgba(52,152,219,0.3); background: rgba(52,152,219,0.05); }

        .queue-ticket {
            font-size: 26px;
            font-weight: 800;
            color: white;
        }

        .queue-row.next .queue-ticket { color: #f39c12; }

        .queue-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        .queue-desc strong { color: white; display: block; font-size: 15px; margin-bottom: 2px; }

        .queue-wait {
            text-align: center;
        }

        .wait-time {
            font-size: 20px;
            font-weight: 700;
            color: #27ae60;
        }

        .queue-row.next .wait-time { color: #f39c12; }

        .wait-label { font-size: 11px; color: rgba(255,255,255,0.4); }

        .queue-badge {
            text-align: right;
        }

        .badge-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-next { background: rgba(243,156,18,0.2); color: #f39c12; border: 1px solid rgba(243,156,18,0.4); }
        .badge-wait { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .badge-soon { background: rgba(52,152,219,0.15); color: #3498db; border: 1px solid rgba(52,152,219,0.3); }

        /* Right: Menu Pricing Carousel */
        .right-section {
            border-left: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(255,255,255,0.02);
        }

        .menu-header {
            padding: 20px 24px 12px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .category-tabs {
            display: flex;
            overflow-x: auto;
            padding: 12px 20px;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .cat-tab {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5);
            border: 1px solid transparent;
            cursor: default;
            transition: all 0.3s;
        }

        .cat-tab.active {
            background: rgba(243,156,18,0.15);
            color: #f39c12;
            border-color: rgba(243,156,18,0.3);
        }

        .menu-items-display {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
        }

        .menu-display-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .menu-display-item:last-child { border-bottom: none; }

        .menu-item-left {}
        .menu-item-display-name {
            font-size: 15px;
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
        }

        .menu-item-display-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }

        .menu-item-display-price {
            font-size: 22px;
            font-weight: 800;
            color: #f39c12;
            flex-shrink: 0;
        }

        .menu-item-display-price span {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255,255,255,0.4);
        }

        /* Bottom ticker */
        .bottom-ticker {
            background: rgba(243,156,18,0.1);
            border-top: 1px solid rgba(243,156,18,0.2);
            padding: 12px 0;
            overflow: hidden;
            position: relative;
        }

        .ticker-track {
            display: flex;
            gap: 80px;
            white-space: nowrap;
            animation: ticker 30s linear infinite;
        }

        @keyframes ticker {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .ticker-item {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            flex-shrink: 0;
        }

        .ticker-item strong { color: #f39c12; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;

    const MENU_DATA = {
        "Appetizers": [
            { name: "Spring Rolls", desc: "Crispy vegetable rolls with dipping sauce", price: 6.99 },
            { name: "Chicken Wings", desc: "Buffalo or BBQ — 6 pieces", price: 8.99 },
            { name: "Garlic Bread", desc: "Toasted with cheese and herbs", price: 4.99 },
            { name: "Soup of the Day", desc: "Ask your server", price: 5.99 },
        ],
        "Main Course": [
            { name: "Burger Deluxe", desc: "Beef, cheddar, lettuce, special sauce + fries", price: 12.99 },
            { name: "Grilled Chicken", desc: "With seasonal vegetables", price: 14.99 },
            { name: "Fish & Chips", desc: "Beer-battered cod with tartare sauce", price: 13.99 },
            { name: "Pasta Carbonara", desc: "Creamy bacon and parmesan", price: 11.99 },
            { name: "Ribeye Steak", desc: "8oz with choice of sauce and sides", price: 24.99 },
            { name: "Caesar Salad", desc: "Romaine, parmesan, croutons, anchovies", price: 9.99 },
        ],
        "Beverages": [
            { name: "Soft Drinks", desc: "Coca Cola, Sprite, Fanta", price: 2.99 },
            { name: "Fresh Juice", desc: "Orange, apple or mixed berry", price: 4.99 },
            { name: "Coffee", desc: "Espresso, latte, cappuccino", price: 2.49 },
            { name: "Water", desc: "Still or sparkling", price: 0.00 },
        ],
        "Desserts": [
            { name: "Chocolate Cake", desc: "Rich dark chocolate with cream", price: 6.99 },
            { name: "Ice Cream", desc: "Three scoops, choice of flavour", price: 4.99 },
            { name: "Apple Pie", desc: "Warm with vanilla ice cream", price: 5.99 },
        ],
    };

    const QUEUE_DATA = [
        { ticket: "A47", name: "Smith", party: 2, wait: 5, status: "next" },
        { ticket: "A48", name: "Johnson", party: 4, wait: 12, status: "soon" },
        { ticket: "A49", name: "Williams", party: 3, wait: 20, status: "wait" },
        { ticket: "A50", name: "Brown", party: 2, wait: 28, status: "wait" },
        { ticket: "A51", name: "Davis", party: 6, wait: 35, status: "wait" },
    ];

    const NOW_SERVING = [{ ticket: "A45", table: 4 }, { ticket: "A46", table: 7 }];

    const TICKER_MSGS = [
        "🎉 Today's Special: Ribeye Steak + Wine for Rs.29.99",
        "⏰ Happy Hour: 5PM – 7PM | All Drinks 30% Off",
        "📱 Scan QR code to order from your table",
        "🎂 Celebrating a birthday? Ask staff about our dessert surprise!",
        "🚗 Free parking available at the rear of the building",
        "⭐ Enjoyed your meal? Leave us a review on Google!",
        "🍽️ Catering & Private Events — Ask our manager for details",
    ];

    function Clock() {
        const [time, setTime] = useState(new Date());
        useEffect(() => {
            const t = setInterval(() => setTime(new Date()), 1000);
            return () => clearInterval(t);
        }, []);
        return (
            <div className="top-center">
                <div className="top-clock">
                    {time.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                </div>
                <div className="top-date">
                    {time.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                </div>
            </div>
        );
    }

    function WaitingDisplay() {
        const categories = Object.keys(MENU_DATA);
        const [activeCat, setActiveCat] = useState(0);

        // Auto-rotate menu categories every 6 seconds
        useEffect(() => {
            const t = setInterval(() => {
                setActiveCat(c => (c + 1) % categories.length);
            }, 6000);
            return () => clearInterval(t);
        }, []);

        const currentItems = MENU_DATA[categories[activeCat]];
        const tickerDouble = [...TICKER_MSGS, ...TICKER_MSGS];

        return (
            <div className="main-wrap">
                <div className="bg-animate"/>

                {/* Top Bar */}
                <div className="top-bar">
                    <div className="restaurant-name">🍽️ The Grand Table</div>
                    <Clock />
                    <div className="status-pill">
                        <div className="status-dot"/>
                        Now Open
                    </div>
                </div>

                {/* Main Content */}
                <div className="content-grid">

                    {/* Left: Queue */}
                    <div className="left-section">

                        {/* Now Serving */}
                        <div className="now-serving-banner">
                            <div>
                                <div className="now-serving-label">🔔 Now Serving</div>
                                <div className="now-serving-numbers">
                                    {NOW_SERVING.map((s, i) => (
                                        <div key={i} className="serving-number">{s.ticket}</div>
                                    ))}
                                </div>
                            </div>
                            <div className="now-serving-right">
                                {NOW_SERVING.map((s, i) => (
                                    <div key={i}>
                                        <div className="now-serving-table">Table {s.table}</div>
                                    </div>
                                ))}
                                <div className="now-serving-ready" style={{ marginTop: '8px' }}>
                                    ✅ Please proceed to your table
                                </div>
                            </div>
                        </div>

                        {/* Queue List */}
                        <div className="queue-section">
                            <div className="queue-header">Waiting Queue</div>
                            <div className="queue-list">
                                {QUEUE_DATA.map((q, i) => (
                                    <div key={i} className={`queue-row ${q.status}`}>
                                        <div className="queue-ticket">{q.ticket}</div>
                                        <div className="queue-desc">
                                            <strong>{q.name} party</strong>
                                            {q.party} {q.party === 1 ? 'guest' : 'guests'}
                                        </div>
                                        <div className="queue-wait">
                                            <div className="wait-time">~{q.wait} min</div>
                                            <div className="wait-label">est. wait</div>
                                        </div>
                                        <div className="queue-badge">
                                            <span className={`badge-pill ${q.status === 'next' ? 'badge-next' : q.status === 'soon' ? 'badge-soon' : 'badge-wait'}`}>
                                                {q.status === 'next' ? '🔔 Up Next' : q.status === 'soon' ? '⏳ Soon' : 'Waiting'}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Right: Menu Prices */}
                    <div className="right-section">
                        <div className="menu-header">📋 Today's Menu</div>

                        <div className="category-tabs">
                            {categories.map((cat, i) => (
                                <div key={i} className={`cat-tab ${activeCat === i ? 'active' : ''}`}>
                                    {cat}
                                </div>
                            ))}
                        </div>

                        <div className="menu-items-display">
                            {currentItems.map((item, i) => (
                                <div key={i} className="menu-display-item">
                                    <div className="menu-item-left">
                                        <div className="menu-item-display-name">{item.name}</div>
                                        <div className="menu-item-display-desc">{item.desc}</div>
                                    </div>
                                    <div className="menu-item-display-price">
                                        {item.price === 0 ? <span>Free</span> : <>Rs.{item.price.toFixed(2)}</>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>

                {/* Bottom Ticker */}
                <div className="bottom-ticker">
                    <div className="ticker-track">
                        {tickerDouble.map((msg, i) => (
                            <span key={i} className="ticker-item">
                                {msg} &nbsp;&nbsp;&nbsp; <strong>·</strong>
                            </span>
                        ))}
                    </div>
                </div>
            </div>
        );
    }

    ReactDOM.render(<WaitingDisplay />, document.getElementById('root'));
</script>

<script>
// ── Grand Table POS Auth init ─────────────────────────
POS_AUTH.init("waiting-display", {
  onReady: function(session) {
    var root = document.getElementById("app-root");
    if (root) root.style.display = "block";
    POS_AUTH.renderBadge("user-badge", "waiting-display");
  },
  onError: function(msg) { console.error("Auth error:", msg); }
});
</script>
</body>
</html>
