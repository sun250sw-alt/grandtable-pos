<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Driver App — The Grand Table</title>
<script src="pos-config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f0f2f5;color:#1a1a2e;height:100vh;overflow:hidden;}
.app{max-width:480px;margin:0 auto;height:100vh;display:flex;
  flex-direction:column;background:#f0f2f5;position:relative;}

/* HEADER */
.header{background:linear-gradient(135deg,#1a1a2e,#2d3561);
  padding:12px 16px;color:#fff;flex-shrink:0;z-index:10;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.driver-info{display:flex;align-items:center;gap:10px;}
.d-avatar{width:40px;height:40px;border-radius:50%;background:#f39c12;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:800;color:#000;flex-shrink:0;}
.d-name{font-weight:700;font-size:15px;}
.d-vehicle{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
.online-btn{padding:6px 16px;border-radius:20px;border:none;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.online-btn.on{background:#27ae60;color:#fff;}
.online-btn.off{background:rgba(255,255,255,.15);color:rgba(255,255,255,.6);}

/* STATS */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);
  background:#fff;border-bottom:1px solid #eee;flex-shrink:0;}
.stat-s{text-align:center;padding:10px 4px;}
.stat-s-val{font-size:18px;font-weight:900;}
.stat-s-lbl{font-size:10px;color:#888;margin-top:1px;}

/* NAV */
.nav{display:flex;background:#fff;border-bottom:2px solid #eee;flex-shrink:0;}
.nav-tab{flex:1;padding:11px 0;text-align:center;font-size:11px;font-weight:700;
  color:#888;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;
  text-transform:uppercase;letter-spacing:.5px;}
.nav-tab.active{color:#1a1a2e;border-bottom-color:#f39c12;}

/* GPS BAR */
.gps-bar{background:#fff;padding:7px 14px;display:flex;align-items:center;
  gap:8px;font-size:12px;color:#888;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
.gps-dot-el{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s;}
.acc-good{background:#27ae60;}
.acc-med{background:#f39c12;}
.acc-poor{background:#e74c3c;}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;}

/* MAP */
#map-container{position:relative;width:100%;height:220px;background:#dbeafe;flex-shrink:0;}
#gmap{width:100%;height:100%;}
.map-eta{position:absolute;top:10px;right:10px;z-index:5;
  background:#1a1a2e;color:#fff;padding:6px 13px;border-radius:18px;
  font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.map-live{position:absolute;top:10px;left:10px;z-index:5;
  background:rgba(39,174,96,.9);color:#fff;padding:4px 10px;
  border-radius:10px;font-size:11px;font-weight:700;
  display:flex;align-items:center;gap:5px;}
.live-pulse{width:7px;height:7px;border-radius:50%;background:#fff;
  animation:lpulse 1.5s infinite;}
@keyframes lpulse{0%,100%{opacity:1}50%{opacity:.3}}
.map-recenter{position:absolute;bottom:10px;right:10px;z-index:5;
  background:#fff;border:none;border-radius:50%;width:38px;height:38px;
  font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.map-no-key{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#dbeafe;
  font-size:13px;color:#3b82f6;font-weight:600;gap:6px;padding:16px;text-align:center;}

/* ORDER CARDS */
.orders-wrap{padding:12px;}
.order-card{background:#fff;border-radius:14px;margin-bottom:12px;
  overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.oc-header{padding:12px 14px;display:flex;justify-content:space-between;
  align-items:center;border-bottom:1px solid #f5f5f5;}
.oc-id{font-weight:800;font-size:15px;}
.oc-time{font-size:11px;color:#888;margin-top:2px;}
.status-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.chip-pickup{background:#fef3c7;color:#d97706;}
.chip-transit{background:#dbeafe;color:#2563eb;}

.oc-route{padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
.route-pt{display:flex;align-items:flex-start;gap:10px;}
.rp-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;}
.rp-rest{background:#fee2e2;}
.rp-cust{background:#d1fae5;}
.rp-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.rp-addr{font-size:13px;font-weight:700;margin-top:1px;}
.rp-sub{font-size:11px;color:#888;}
.route-line2{height:14px;width:2px;background:#e5e7eb;margin-left:14px;}

.oc-footer{padding:10px 14px;background:#f9fafb;display:flex;
  justify-content:space-between;align-items:center;border-top:1px solid #f0f0f0;}
.oc-items{font-size:12px;color:#555;}
.oc-val{font-size:15px;font-weight:800;color:#27ae60;}

.oc-actions{padding:10px 14px;display:flex;flex-direction:column;gap:7px;}
.act-btn{padding:12px;border:none;border-radius:10px;font-size:13px;
  font-weight:700;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;}
.act-btn:active{transform:scale(.98);}
.btn-nav-rest{background:#1a1a2e;color:#fff;}
.btn-nav-cust{background:#2d3561;color:#fff;}
.btn-show-route{background:#eef0ff;color:#667eea;}
.btn-pickup{background:#f39c12;color:#fff;}
.btn-delivered{background:#27ae60;color:#fff;}
.btn-call{background:#fee2e2;color:#dc2626;}

/* NEW ORDER BANNER */
.nb-wrap{padding:12px 12px 0;}
.new-order-banner{background:linear-gradient(135deg,#27ae60,#1e8449);
  border-radius:14px;padding:18px;color:#fff;
  box-shadow:0 4px 20px rgba(39,174,96,.35);
  animation:popin .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popin{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.nb-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.8;margin-bottom:5px;}
.nb-title{font-size:20px;font-weight:900;margin-bottom:3px;}
.nb-detail{font-size:13px;opacity:.8;margin-bottom:14px;}
.nb-btns{display:flex;gap:8px;}
.nb-accept{flex:1;padding:13px;background:#fff;color:#27ae60;
  border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;}
.nb-decline{padding:13px 18px;background:rgba(255,255,255,.15);
  color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}

/* EARNINGS */
.earn-wrap{padding:12px;}
.earn-hero{background:linear-gradient(135deg,#27ae60,#1e8449);
  border-radius:16px;padding:22px 20px;color:#fff;text-align:center;
  margin-bottom:12px;box-shadow:0 4px 20px rgba(39,174,96,.3);}
.earn-big{font-size:52px;font-weight:900;line-height:1;}
.earn-sub{font-size:13px;opacity:.75;margin-top:4px;}
.earn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.earn-box{background:rgba(255,255,255,.15);border-radius:10px;padding:12px;text-align:center;}
.earn-box-val{font-size:20px;font-weight:800;margin-bottom:2px;}
.earn-box-lbl{font-size:11px;opacity:.75;}
.earn-card{background:#fff;border-radius:14px;padding:18px;
  margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.earn-card-title{font-size:14px;font-weight:700;margin-bottom:14px;color:#888;
  text-transform:uppercase;letter-spacing:.5px;}
.earn-row{display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid #f5f5f5;}
.earn-row:last-child{border-bottom:none;}
.er-day{font-size:13px;font-weight:600;}
.er-val{font-size:15px;font-weight:800;color:#27ae60;}

/* HISTORY */
.hist-wrap{padding:12px;}
.hist-item{background:#fff;border-radius:12px;padding:14px;
  margin-bottom:10px;display:flex;justify-content:space-between;
  align-items:center;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.hi-id{font-weight:700;font-size:14px;}
.hi-addr{font-size:12px;color:#888;margin-top:2px;}
.hi-time{font-size:11px;color:#aaa;margin-top:1px;}
.hi-earn{font-size:18px;font-weight:900;color:#27ae60;}

/* EMPTY/OFFLINE */
.center-state{text-align:center;padding:56px 20px;color:#aaa;}
.cs-icon{font-size:52px;margin-bottom:14px;}
.cs-title{font-size:17px;font-weight:800;margin-bottom:6px;color:#888;}
.cs-sub{font-size:13px;}
</style>
</head>
<body>
<div class="app" id="app" style="display:none">

  <div class="header">
    <div class="header-row">
      <div class="driver-info">
        <div class="d-avatar" id="hdr-av">?</div>
        <div>
          <div class="d-name"   id="hdr-name">Loading…</div>
          <div class="d-vehicle" id="hdr-veh">🚗</div>
        </div>
      </div>
      <div id="user-badge" style="display:flex;align-items:center;gap:6px;"></div>
      <button class="online-btn on" id="online-btn" onclick="toggleOnline()">● Online</button>
    </div>
  </div>

  <div class="stats-strip">
    <div class="stat-s"><div class="stat-s-val" id="st-earn" style="color:#27ae60">Rs.0</div><div class="stat-s-lbl">Earnings</div></div>
    <div class="stat-s"><div class="stat-s-val" id="st-del">0</div><div class="stat-s-lbl">Delivered</div></div>
    <div class="stat-s"><div class="stat-s-val" id="st-km">—</div><div class="stat-s-lbl">Distance</div></div>
    <div class="stat-s"><div class="stat-s-val" style="color:#f39c12">⭐ 4.9</div><div class="stat-s-lbl">Rating</div></div>
  </div>

  <div class="nav">
    <div class="nav-tab active" id="tab-orders"   onclick="setTab('orders')">📦 Orders</div>
    <div class="nav-tab"        id="tab-earnings" onclick="setTab('earnings')">💷 Earnings</div>
    <div class="nav-tab"        id="tab-history"  onclick="setTab('history')">🕐 History</div>
  </div>

  <div class="gps-bar">
    <div class="gps-dot-el acc-poor" id="gps-dot"></div>
    <span id="gps-lbl">Acquiring GPS…</span>
  </div>

  <div class="content" id="content">
    <div class="center-state"><div class="cs-icon">📡</div><div class="cs-title">Getting location…</div></div>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────
var APP = {
  session  : null,
  online   : true,
  tab      : "orders",
  orders   : [],
  history  : [],
  earn     : { today:21.60, week:142.80, dels:4, km:12.4 },
  gps      : null,     // {lat,lng,accuracy}
  map      : null,     // google.maps.Map
  dirR     : null,     // DirectionsRenderer
  driverM  : null,     // driver marker
  mapReady : false,
  newBanner: false,
};

// Demo data
var DEMO_ORDERS = [
  { id:"ORD-082", time:"12:34 PM", status:"pickup",
    rest:{ name:"The Grand Table", addr:"15 Baker St, London W1U 3AA", lat:51.5237, lng:-0.1585 },
    cust:{ name:"Mr. James",       addr:"42 Oxford Rd, London W1D 2LN", phone:"+44 7911 123456", lat:51.5150, lng:-0.1416 },
    items:["Burger Deluxe ×2","Coca Cola ×2"], val:31.97 },
  { id:"ORD-079", time:"12:18 PM", status:"transit",
    rest:{ name:"The Grand Table", addr:"15 Baker St, London W1U 3AA", lat:51.5237, lng:-0.1585 },
    cust:{ name:"Ms. Chen",        addr:"7 Regent St, London W1B 4EA",  phone:"+44 7800 654321", lat:51.5101, lng:-0.1343 },
    items:["Steak ×1","Caesar Salad ×1","Water ×2"], val:37.97 },
];
var DEMO_HIST = [
  { id:"ORD-076", addr:"12 Park Lane",        time:"11:52 AM", earn:5.20 },
  { id:"ORD-073", addr:"88 Bond Street",      time:"11:14 AM", earn:4.80 },
  { id:"ORD-071", addr:"3 Piccadilly Circus", time:"10:47 AM", earn:6.10 },
  { id:"ORD-068", addr:"55 Kings Road",       time:"10:12 AM", earn:5.50 },
];

// ── AUTH ──────────────────────────────────────────────────────
POS_AUTH.init("driver-app", {
  onReady: function(session) {
    APP.session = session;
    APP.orders  = DEMO_ORDERS;
    APP.history = DEMO_HIST;
    document.getElementById("app").style.display = "flex";
    // Header
    var name = (session && session.name) ? session.name : "Driver";
    var veh  = (session && session.driverData && session.driverData.Vehicle) ? session.driverData.Vehicle : "Vehicle";
    var plt  = (session && session.driverData && session.driverData.PlateNumber) ? session.driverData.PlateNumber : "";
    document.getElementById("hdr-av").textContent   = name.charAt(0).toUpperCase();
    document.getElementById("hdr-name").textContent  = name;
    document.getElementById("hdr-veh").textContent   = "🚗 " + veh + (plt ? " · " + plt : "");
    document.getElementById("st-earn").textContent   = "Rs." + APP.earn.today.toFixed(2);
    document.getElementById("st-del").textContent    = APP.earn.dels;
    document.getElementById("st-km").textContent     = APP.earn.km + " km";
    // Start GPS
    startGPS();
    // Load Maps
    loadMapsAPI();
    // First render
    render();
    // Simulate new order after 10s
    setTimeout(showNewOrderBanner, 10000);
  },
  onError: function(e) { console.error("Auth:", e); }
});

// ── GPS ───────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { setGPSBar(null, "GPS not supported"); return; }
  navigator.geolocation.watchPosition(
    function(pos) {
      APP.gps = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy };
      setGPSBar(pos.coords.accuracy);
      updateDriverMarker();
      sendLocationToSheet();
    },
    function(err) { setGPSBar(null, "GPS unavailable"); },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 12000 }
  );
}

function setGPSBar(acc, msg) {
  var dot = document.getElementById("gps-dot");
  var lbl = document.getElementById("gps-lbl");
  if (!acc) {
    dot.className = "gps-dot-el acc-poor";
    lbl.textContent = msg || "GPS unavailable";
    return;
  }
  if (acc < 20)      { dot.className = "gps-dot-el acc-good"; lbl.textContent = "GPS locked · ±"+Math.round(acc)+"m"; }
  else if (acc < 60) { dot.className = "gps-dot-el acc-med";  lbl.textContent = "GPS fair · ±"+Math.round(acc)+"m"; }
  else               { dot.className = "gps-dot-el acc-poor"; lbl.textContent = "GPS weak · ±"+Math.round(acc)+"m — move outside"; }
}

var _lastSend = 0;
function sendLocationToSheet() {
  if (!APP.gps || !APP.session || Date.now()-_lastSend < 30000) return;
  _lastSend = Date.now();
  var api = window.POS_GAPI; if(!api || !api.getSheetId || !api.getSheetId()) return;
  api.post && api.post({ action:"updateDriverLocation", data:{
    email: APP.session.email, lat: APP.gps.lat, lng: APP.gps.lng,
    accuracy: APP.gps.acc, ts: new Date().toISOString()
  }}).catch(function(){});
}

// ── GOOGLE MAPS ───────────────────────────────────────────────
function hasMapsKey() {
  return typeof POS_CONFIG !== "undefined" &&
         POS_CONFIG.MAPS_API_KEY &&
         POS_CONFIG.MAPS_API_KEY !== "YOUR_MAPS_API_KEY";
}

function loadMapsAPI() {
  if (!hasMapsKey()) return;
  var s = document.createElement("script");
  s.src = "https://maps.googleapis.com/maps/api/js?key=" +
          POS_CONFIG.MAPS_API_KEY + "&libraries=geometry&callback=mapsReady";
  s.async = true; s.defer = true;
  document.head.appendChild(s);
}

window.mapsReady = function() {
  var el = document.getElementById("gmap");
  if (!el) return;

  var center = APP.gps ? { lat: APP.gps.lat, lng: APP.gps.lng } : { lat:51.505, lng:-0.09 };

  APP.map = new google.maps.Map(el, {
    zoom: 14, center: center, mapTypeId: "roadmap",
    disableDefaultUI: true, zoomControl: true, gestureHandling: "greedy",
    styles:[
      { featureType:"poi",     elementType:"labels", stylers:[{visibility:"off"}] },
      { featureType:"transit", elementType:"labels", stylers:[{visibility:"off"}] },
    ]
  });

  APP.dirR = new google.maps.DirectionsRenderer({
    map: APP.map, suppressMarkers: true,
    polylineOptions: { strokeColor:"#667eea", strokeWeight:5, strokeOpacity:.85 }
  });

  APP.mapReady = true;

  // Remove loading overlay if present
  var loading = document.getElementById("map-loading");
  if (loading) loading.remove();

  // Place driver marker
  if (APP.gps) placeDriverMarker();

  // Draw route for first order
  if (APP.orders.length) drawRoute(APP.orders[0]);
};

function placeDriverMarker() {
  if (!APP.mapReady || !APP.gps) return;
  var pos = { lat: APP.gps.lat, lng: APP.gps.lng };
  if (APP.driverM) {
    APP.driverM.setPosition(pos);
  } else {
    APP.driverM = new google.maps.Marker({
      position: pos, map: APP.map, title: "You", zIndex: 10,
      icon: { path: google.maps.SymbolPath.CIRCLE, scale: 10,
              fillColor:"#4285F4", fillOpacity:1, strokeColor:"#fff", strokeWeight:3 }
    });
  }
}

function updateDriverMarker() {
  if (!APP.mapReady) return;
  placeDriverMarker();
}

var _extraMarkers = [];
function drawRoute(order) {
  if (!APP.mapReady || !order) return;

  // Clear old markers
  _extraMarkers.forEach(function(m){ m.setMap(null); });
  _extraMarkers = [];

  var driverPos = APP.gps
    ? { lat: APP.gps.lat, lng: APP.gps.lng }
    : { lat: order.rest.lat, lng: order.rest.lng };

  var origin      = driverPos;
  var destination = { lat: order.cust.lat, lng: order.cust.lng };
  var waypoints   = [];

  // If pickup stage: route is driver → restaurant → customer
  if (order.status === "pickup") {
    waypoints = [{ location:{ lat:order.rest.lat, lng:order.rest.lng }, stopover:true }];
  }

  new google.maps.DirectionsService().route({
    origin: origin,
    destination: destination,
    waypoints: waypoints,
    travelMode: google.maps.TravelMode.DRIVING,
  }, function(result, status) {
    if (status !== "OK") { console.warn("Directions API:", status); return; }
    APP.dirR.setDirections(result);

    // ETA from first leg
    var leg   = result.routes[0].legs[0];
    var etaEl = document.getElementById("map-eta");
    if (etaEl) etaEl.textContent = "ETA " + leg.duration.text;

    // Total distance
    var totalM = result.routes[0].legs.reduce(function(s,l){ return s+l.distance.value; }, 0);
    APP.earn.km = (totalM/1000).toFixed(1);
    document.getElementById("st-km").textContent = APP.earn.km + " km";

    // Restaurant marker
    _extraMarkers.push(new google.maps.Marker({
      position: { lat:order.rest.lat, lng:order.rest.lng },
      map: APP.map, title: order.rest.name, zIndex:5,
      icon: {
        path: "M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z",
        fillColor:"#e74c3c", fillOpacity:1, strokeColor:"#fff", strokeWeight:1,
        scale:1.6, anchor: new google.maps.Point(12,22)
      },
      label:{ text:"R", color:"#fff", fontSize:"11px", fontWeight:"bold" }
    }));

    // Customer marker
    _extraMarkers.push(new google.maps.Marker({
      position: destination,
      map: APP.map, title: order.cust.name, zIndex:5,
      icon: {
        path: "M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z",
        fillColor:"#27ae60", fillOpacity:1, strokeColor:"#fff", strokeWeight:1,
        scale:1.6, anchor: new google.maps.Point(12,22)
      },
      label:{ text:"C", color:"#fff", fontSize:"11px", fontWeight:"bold" }
    }));
  });
}

function recenterMap() {
  if (!APP.map || !APP.gps) return;
  APP.map.panTo({ lat: APP.gps.lat, lng: APP.gps.lng });
  APP.map.setZoom(15);
}

function openGoogleMaps(addr) {
  var url = "https://www.google.com/maps/dir/?api=1&destination=" +
            encodeURIComponent(addr) + "&travelmode=driving";
  window.open(url, "_blank");
}

function showRouteOnMap(id) {
  var order = APP.orders.find(function(o){ return o.id===id; });
  if (order && APP.mapReady) {
    drawRoute(order);
    document.getElementById("content").scrollTop = 0;
  }
}

// ── TABS ──────────────────────────────────────────────────────
function setTab(tab) {
  APP.tab = tab;
  ["orders","earnings","history"].forEach(function(t){
    document.getElementById("tab-"+t).classList.toggle("active", t===tab);
  });
  render();
  // Re-init map after DOM rebuild
  if (tab === "orders" && APP.mapReady && APP.orders.length) {
    setTimeout(function(){ drawRoute(APP.orders[0]); }, 100);
  }
}

function toggleOnline() {
  APP.online = !APP.online;
  var btn = document.getElementById("online-btn");
  btn.className   = "online-btn " + (APP.online ? "on" : "off");
  btn.textContent = APP.online ? "● Online" : "○ Offline";
  render();
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  var el = document.getElementById("content");
  if (APP.tab === "orders")   { el.innerHTML = renderOrders();   return; }
  if (APP.tab === "earnings") { el.innerHTML = renderEarnings(); return; }
  if (APP.tab === "history")  { el.innerHTML = renderHistory();  return; }
}

// ── ORDERS ────────────────────────────────────────────────────
function renderOrders() {
  if (!APP.online) return '<div class="center-state"><div class="cs-icon">😴</div><div class="cs-title">You\'re Offline</div><div class="cs-sub">Tap Online to receive orders</div></div>';

  var mapHtml = hasMapsKey()
    ? '<div id="map-container"><div id="gmap"></div>' +
      (!APP.mapReady ? '<div id="map-loading" style="position:absolute;inset:0;background:#dbeafe;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;color:#3b82f6;font-weight:600;gap:6px"><div style="font-size:32px;animation:spin 2s linear infinite">🗺️</div><div>Loading map…</div></div>' : '') +
      '<div class="map-eta" id="map-eta">Calculating…</div>' +
      '<div class="map-live"><div class="live-pulse"></div>Live GPS</div>' +
      '<button class="map-recenter" onclick="recenterMap()">📍</button>' +
      '</div>'
    : '<div id="map-container"><div class="map-no-key"><div style="font-size:32px">🗺️</div>' +
      '<div>Add <strong>MAPS_API_KEY</strong> to pos-config.js<br>to enable live route tracking</div></div></div>';

  var bannerHtml = APP.newBanner
    ? '<div class="nb-wrap"><div class="new-order-banner">' +
      '<div class="nb-tag">🔔 New Order Request</div>' +
      '<div class="nb-title">ORD-091 · 2.1 km away</div>' +
      '<div class="nb-detail">3 items · Est. Rs.4.80 · ~18 min</div>' +
      '<div class="nb-btns">' +
      '<button class="nb-accept" onclick="acceptOrder()">✅ Accept</button>' +
      '<button class="nb-decline" onclick="dismissBanner()">Decline</button>' +
      '</div></div></div>' : '';

  var cardsHtml = APP.orders.length === 0
    ? '<div class="center-state"><div class="cs-icon">🎉</div><div class="cs-title">All Delivered!</div><div class="cs-sub">Waiting for new orders…</div></div>'
    : APP.orders.map(orderCardHtml).join("");

  return mapHtml + bannerHtml + '<div class="orders-wrap">' + cardsHtml + '</div>';
}

function orderCardHtml(o) {
  var isPickup  = o.status === "pickup";
  var isTransit = o.status === "transit";
  return '<div class="order-card">' +
    '<div class="oc-header">' +
      '<div><div class="oc-id">' + o.id + '</div><div class="oc-time">Ordered at ' + o.time + '</div></div>' +
      '<span class="status-chip ' + (isPickup ? "chip-pickup" : "chip-transit") + '">' +
        (isPickup ? "📦 Pickup" : "🚗 In Transit") + '</span>' +
    '</div>' +
    '<div class="oc-route">' +
      '<div class="route-pt">' +
        '<div class="rp-icon rp-rest">🍽️</div>' +
        '<div><div class="rp-lbl">Pickup from</div>' +
        '<div class="rp-addr">' + o.rest.name + '</div>' +
        '<div class="rp-sub">' + o.rest.addr + '</div></div>' +
      '</div>' +
      '<div class="route-line2"></div>' +
      '<div class="route-pt">' +
        '<div class="rp-icon rp-cust">📍</div>' +
        '<div><div class="rp-lbl">Deliver to</div>' +
        '<div class="rp-addr">' + o.cust.name + '</div>' +
        '<div class="rp-sub">' + o.cust.addr + '</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="oc-footer">' +
      '<div class="oc-items">' + o.items.length + ' items · ' + o.items[0] +
        (o.items.length > 1 ? ' +' + (o.items.length-1) + ' more' : '') + '</div>' +
      '<div class="oc-val">LKR ' + o.val.toFixed(2) + '</div>' +
    '</div>' +
    '<div class="oc-actions">' +
      (isPickup
        ? '<button class="act-btn btn-nav-rest" onclick="openGoogleMaps(\'' + o.rest.addr + '\')">🗺️ Navigate to Restaurant</button>' +
          '<button class="act-btn btn-show-route" onclick="showRouteOnMap(\'' + o.id + '\')">📍 Show Full Route on Map</button>' +
          '<button class="act-btn btn-pickup" onclick="updateStatus(\'' + o.id + '\',\'transit\')">✅ Picked Up — Start Delivery</button>'
        : '<button class="act-btn btn-nav-cust" onclick="openGoogleMaps(\'' + o.cust.addr + '\')">🗺️ Navigate to Customer</button>' +
          '<button class="act-btn btn-show-route" onclick="showRouteOnMap(\'' + o.id + '\')">📍 Show Route on Map</button>' +
          '<button class="act-btn btn-delivered" onclick="updateStatus(\'' + o.id + '\',\'delivered\')">🎉 Mark as Delivered</button>') +
      '<button class="act-btn btn-call" onclick="window.location.href=\'tel:' + o.cust.phone + '\'">📞 Call Customer (' + o.cust.phone + ')</button>' +
    '</div>' +
  '</div>';
}

function updateStatus(id, status) {
  if (status === "delivered") {
    APP.orders = APP.orders.filter(function(o){ return o.id !== id; });
    APP.earn.today += 4.80;
    APP.earn.dels++;
    APP.history.unshift({ id:id, addr:"Delivered successfully",
      time: new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}), earn:4.80 });
    document.getElementById("st-earn").textContent = "Rs." + APP.earn.today.toFixed(2);
    document.getElementById("st-del").textContent  = APP.earn.dels;
    var api = window.POS_GAPI || window.POS_API; if(api && api.Deliveries) api.Deliveries.update({ deliveryId: id, status: 'delivered' }).catch(function(){});
  } else {
    APP.orders = APP.orders.map(function(o){ return o.id===id ? Object.assign({},o,{status:status}) : o; });
    POS_API.Deliveries.update({ deliveryId:id, status:status }).catch(function(){});
  }
  render();
  if (APP.mapReady && APP.orders.length) setTimeout(function(){ drawRoute(APP.orders[0]); }, 100);
}

// ── EARNINGS ─────────────────────────────────────────────────
function renderEarnings() {
  var e = APP.earn;
  var days = [
    { d:"Mon", v:52.40 }, { d:"Tue", v:68.80 }, { d:"Wed", v:e.today },
    { d:"Thu", v:null },  { d:"Fri", v:null },   { d:"Sat", v:null }, { d:"Sat", v:null }
  ];
  return '<div class="earn-wrap">' +
    '<div class="earn-hero">' +
      '<div class="earn-big">LKR ' + e.today.toFixed(2) + '</div>' +
      '<div class="earn-sub">Today · ' + e.dels + ' deliveries</div>' +
      '<div class="earn-grid">' +
        '<div class="earn-box"><div class="earn-box-val">LKR ' + (e.today*.84).toFixed(2) + '</div><div class="earn-box-lbl">Base Pay</div></div>' +
        '<div class="earn-box"><div class="earn-box-val">LKR ' + (e.today*.16).toFixed(2) + '</div><div class="earn-box-lbl">Tips</div></div>' +
        '<div class="earn-box"><div class="earn-box-val">' + e.dels + '</div><div class="earn-box-lbl">Deliveries</div></div>' +
        '<div class="earn-box"><div class="earn-box-val">' + e.km + ' km</div><div class="earn-box-lbl">Distance</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="earn-card"><div class="earn-card-title">📅 This Week</div>' +
    days.map(function(d){
      return '<div class="earn-row"><div class="er-day">' + d.d + '</div>' +
             '<div class="er-val">' + (d.v!=null ? "Rs."+d.v.toFixed(2) : "—") + '</div></div>';
    }).join("") +
    '<div class="earn-row" style="border-top:2px solid #eee;margin-top:4px;">' +
      '<div class="er-day" style="font-weight:800;font-size:15px">Week Total</div>' +
      '<div class="er-val" style="font-size:18px">LKR ' + e.week.toFixed(2) + '</div>' +
    '</div></div></div>';
}

// ── HISTORY ───────────────────────────────────────────────────
function renderHistory() {
  if (!APP.history.length) return '<div class="center-state"><div class="cs-icon">🕐</div><div class="cs-title">No deliveries yet</div></div>';
  return '<div class="hist-wrap">' +
    APP.history.map(function(h){
      return '<div class="hist-item">' +
        '<div><div class="hi-id">' + h.id + ' · ✅ Delivered</div>' +
        '<div class="hi-addr">📍 ' + h.addr + '</div>' +
        '<div class="hi-time">🕐 ' + h.time + '</div></div>' +
        '<div class="hi-earn">+Rs.' + h.earn.toFixed(2) + '</div>' +
        '</div>';
    }).join("") + '</div>';
}

// ── NEW ORDER BANNER ──────────────────────────────────────────
function showNewOrderBanner() {
  if (!APP.online || !APP.session) return;
  APP.newBanner = true;
  render();
  if (APP.mapReady && APP.orders.length) setTimeout(function(){ drawRoute(APP.orders[0]); }, 100);
}

function dismissBanner() { APP.newBanner = false; render(); }

function acceptOrder() {
  APP.newBanner = false;
  var newOrder = {
    id:"ORD-091",
    time: new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),
    status:"pickup",
    rest:{ name:"The Grand Table", addr:"15 Baker St, London W1U 3AA", lat:51.5237, lng:-0.1585 },
    cust:{ name:"Mrs. Patel", addr:"99 Edgware Rd, London W2 1JB", phone:"+44 7900 111222", lat:51.5200, lng:-0.1660 },
    items:["Pasta Carbonara ×2","Garlic Bread ×1"], val:28.97
  };
  APP.orders.unshift(newOrder);
  render();
  if (APP.mapReady) setTimeout(function(){ drawRoute(newOrder); }, 150);
}

// CSS keyframe for spin (used in map loading)
var styleEl = document.createElement("style");
styleEl.textContent = "@keyframes spin{to{transform:rotate(360deg)}}";
document.head.appendChild(styleEl);
</script>
</body>
</html>
