<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Prep Display — The Grand Table</title>
<script src="pos-config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0d1117;color:#e6edf3;min-height:100vh;}

/* HEADER */
.header{background:linear-gradient(135deg,#f39c12,#e67e22);
  padding:14px 24px;display:flex;justify-content:space-between;
  align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.4);}
.header h1{font-size:22px;font-weight:700;color:black;}
.header-right{display:flex;gap:14px;align-items:center;font-size:13px;}
.queue-count{background:rgba(0,0,0,.2);padding:5px 14px;
  border-radius:10px;font-weight:700;color:black;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:300px 1fr;
  height:calc(100vh - 58px);}

/* CHEF SELECTION HOME SCREEN */
.chef-screen {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:calc(100vh - 58px);
  background:#111827;
  padding:40px;
  text-align:center;
}
.chef-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
  gap:16px;
  width:100%;
  max-width:600px;
  margin-top:24px;
}
.chef-card {
  padding:24px 16px;
  border-radius:14px;
  border:2px solid #30363d;
  background:#1f2937;
  cursor:pointer;
  transition:all 0.2s;
}
.chef-card:hover {
  border-color:#f39c12;
  background:#2d2209;
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(243,156,18,0.15);
}
.chef-avatar {
  width:50px; height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,#f39c12,#e67e22);
  color:black;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:800;
  margin:0 auto 12px;
}
.chef-name { font-weight:700; font-size:14px; color:#e6edf3; }

/* QUEUE PANEL */
.queue-panel{background:#161b22;border-right:1px solid #30363d;
  overflow-y:auto;padding:14px;}
.queue-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.5px;color:#8b949e;margin-bottom:12px;}
.queue-item{background:#21262d;border-radius:10px;padding:13px;
  margin-bottom:8px;cursor:pointer;border:2px solid transparent;
  transition:all .2s;position:relative;}
.queue-item:hover{border-color:#f39c12;}
.queue-item.active{border-color:#f39c12;background:#2d2209;}
.qi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.qi-order{font-weight:700;font-size:14px;}
.qi-table{font-size:12px;color:#8b949e;}
.qi-dish{font-size:13px;color:#f39c12;font-weight:600;margin-bottom:4px;}
.qi-note{font-size:11px;color:#8b949e;background:#0d1117;
  padding:4px 8px;border-radius:5px;margin-top:5px;}
.urgency-dot{display:inline-block;width:8px;height:8px;
  border-radius:50%;margin-right:5px;}
.urg-high{background:#e74c3c;animation:urgpulse 1s infinite;}
.urg-med{background:#f39c12;}
.urg-low{background:#27ae60;}
@keyframes urgpulse{0%,100%{opacity:1}50%{opacity:.3}}
.queue-empty{text-align:center;padding:40px 16px;color:#8b949e;}
.queue-empty-icon{font-size:36px;margin-bottom:8px;}

/* Live Background Timer badge on left Queue panel */
.qi-timer-badge {
  position:absolute;
  bottom:10px;
  right:10px;
  background:#f39c12;
  color:black;
  font-size:10px;
  font-weight:900;
  padding:2px 8px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(243,156,18,0.25);
  animation:cookingpulse 1.5s infinite;
}
@keyframes cookingpulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

/* RECIPE PANEL */
.recipe-panel{display:flex;flex-direction:column;overflow:hidden;}

/* No selection / Welcome state */
.no-selection{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;color:#8b949e;text-align:center;padding:40px;}
.ns-icon{font-size:64px;margin-bottom:16px;}
.ns-title{font-size:18px;font-weight:700;margin-bottom:6px;}

/* Loading */
.loading-recipe{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;color:#8b949e;}
.loading-spin{font-size:40px;animation:spin 1.5s linear infinite;margin-bottom:14px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Interactive Check Popup Views */
.gate-modal {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; background:#161b22; padding:40px; text-align:center;
}
.gate-card {
  background:#21262d; border:1px solid #30363d; border-radius:18px;
  padding:32px; max-width:440px; width:100%; box-shadow:0 12px 40px rgba(0,0,0,0.5);
}
.gate-icon { font-size:64px; margin-bottom:16px; }
.gate-title { font-size:22px; font-weight:800; color:white; margin-bottom:8px; }
.gate-sub { font-size:14px; color:#8b949e; line-height:1.6; margin-bottom:24px; }
.gate-btn {
  width:100%; padding:14px; border:none; border-radius:10px;
  background:linear-gradient(135deg,#f39c12,#e67e22); color:black;
  font-weight:800; font-size:16px; cursor:pointer; transition:transform 0.15s;
}
.gate-btn:active { transform:scale(0.98); }

/* Checklist */
.ing-check-list { text-align:left; max-height:180px; overflow-y:auto; margin-bottom:20px; background:#0d1117; padding:12px; border-radius:8px; }
.ing-check-item { display:flex; gap:10px; align-items:center; padding:6px 0; font-size:13px; color:#c9d1d9; }

/* Dynamic focused active cook step style */
.focused-cooking-box {
  display:flex; flex-direction:column; flex:1; padding:20px; background:#080a10;
}
.focus-step-card {
  flex:1; background:#111420; border:2px solid #f39c12; border-radius:16px;
  padding:40px; display:flex; flex-direction:column; align-items:center;
  justify-content:center; text-align:center; box-shadow:0 10px 30px rgba(243,156,18,0.1);
  margin-bottom:20px;
}
.focus-step-num {
  background:#f39c12; color:black; font-weight:900; font-size:16px;
  padding:4px 16px; border-radius:20px; text-transform:uppercase; margin-bottom:18px;
}
.focus-step-title { font-size:32px; font-weight:800; color:white; margin-bottom:14px; }
.focus-step-desc { font-size:19px; line-height:1.7; color:#c9d1d9; max-width:680px; }
.focus-step-tip {
  margin-top:20px; font-size:14px; color:#f39c12; background:rgba(243,156,18,0.08);
  padding:10px 18px; border-radius:8px; border-left:4px solid #f39c12; max-width:600px;
}

/* Timeline Preview at bottom of focused screen */
.timeline-track {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(100px, 1fr)); gap:10px;
}
.timeline-step {
  background:#161b22; border-radius:8px; padding:10px; border-left:3px solid #30363d;
  opacity:0.5; font-size:11px;
}
.timeline-step.active { border-left-color:#f39c12; background:#1c1e10; opacity:1; }
.timeline-step.done { border-left-color:#27ae60; background:#0d1a10; opacity:0.8; }
.timeline-name { font-weight:700; color:white; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* Recipe header */
.recipe-header{background:#161b22;border-bottom:1px solid #30363d;padding:18px 22px;}
.recipe-title{font-size:26px;font-weight:800;margin-bottom:8px;}
.recipe-meta{display:flex;gap:18px;font-size:13px;color:#8b949e;flex-wrap:wrap;}
.recipe-meta span{display:flex;align-items:center;gap:4px;}
.meta-ok{color:#27ae60;}
.meta-warn{color:#f39c12;}
.progress-bar-wrap{margin-top:12px;background:#21262d;border-radius:6px;
  height:6px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,#27ae60,#f39c12);
  border-radius:6px;transition:width .4s ease;}

/* Content grid */
.recipe-content{display:grid;grid-template-columns:1fr 280px;
  flex:1;overflow:hidden;}

/* Steps */
.steps-section{padding:18px 20px;overflow-y:auto;}
.section-lbl{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.5px;color:#8b949e;margin-bottom:12px;}

.step-card{background:#161b22;border-radius:10px;padding:15px;
  margin-bottom:10px;border-left:4px solid #30363d;transition:all .2s;}
.step-card.s-active{border-left-color:#f39c12;background:#1c1e10;}
.step-card.s-done{border-left-color:#27ae60;opacity:.75;}
.step-header{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.step-num{width:30px;height:30px;border-radius:50%;background:#30363d;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;flex-shrink:0;transition:all .2s;}
.s-active .step-num{background:#f39c12;color:#000;}
.s-done  .step-num{background:#27ae60;color:#fff;}
.step-title-text{font-weight:700;font-size:15px;flex:1;}
.step-dur{font-size:11px;color:#8b949e;background:#0d1117;
  padding:3px 10px;border-radius:10px;flex-shrink:0;}
.step-desc{font-size:13px;line-height:1.7;color:#c9d1d9;margin-left:40px;}
.step-tip{margin-left:40px;margin-top:7px;font-size:12px;color:#f39c12;
  background:rgba(243,156,18,.1);padding:6px 10px;border-radius:6px;
  border-left:3px solid #f39c12;}
.step-actions{margin-left:40px;margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;}
.timer-btn{padding:7px 14px;background:#f39c12;color:#000;border:none;
  border-radius:7px;cursor:pointer;font-weight:700;font-size:12px;transition:all .2s;}
.timer-btn.running{background:#e74c3c;color:#fff;}
.done-btn{padding:7px 14px;background:#27ae60;color:#fff;border:none;
  border-radius:7px;cursor:pointer;font-weight:700;font-size:12px;}
.undo-btn{padding:7px 14px;background:#30363d;color:#aaa;border:none;
  border-radius:7px;cursor:pointer;font-weight:700;font-size:12px;}

/* Side panel */
.side-panel{background:#161b22;border-left:1px solid #30363d;
  overflow-y:auto;padding:18px;}

/* Big timer */
.big-timer-box{background:#21262d;border-radius:12px;padding:18px;
  text-align:center;margin-bottom:18px;}
.bt-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;
  color:#8b949e;margin-bottom:6px;}
.bt-display{font-size:52px;font-weight:900;font-family:'Courier New',monospace;
  color:#f39c12;line-height:1;margin-bottom:6px;}
.bt-display.urgent{color:#e74c3c;animation:urgblink .7s infinite;}
.bt-display.done-color{color:#27ae60;}
@keyframes urgblink{0%,100%{opacity:1}50%{opacity:.2}}
.bt-step{font-size:12px;color:#8b949e;margin-bottom:14px;}
.bt-controls{display:flex;gap:8px;justify-content:center;}
.bt-ctrl{padding:8px 16px;border:none;border-radius:7px;
  cursor:pointer;font-weight:700;font-size:12px;}
.bt-pause{background:#f39c12;color:#000;}
.bt-stop{background:#30363d;color:#aaa;}

/* Ingredients */
.ing-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid #21262d;font-size:13px;}
.ing-row:last-child{border-bottom:none;}
.ing-name{color:#c9d1d9;}
.ing-amt{color:#f39c12;font-weight:600;font-size:12px;}

/* No recipe placeholder */
.no-recipe-box{background:#21262d;border-radius:10px;padding:20px;
  text-align:center;margin-bottom:14px;}
.no-recipe-box p{font-size:13px;color:#888;line-height:1.6;}
</style>
</head>
<body>

<div id="app" style="display:none">
  <!-- Dynamic Chef selection screen overlay -->
  <div id="chef-overlay" class="chef-screen">
    <div style="font-size:56px">👨‍🍳</div>
    <h2 style="font-size:26px;font-weight:800;color:white;margin-top:12px">Select Your Cooking Station</h2>
    <p style="color:#8b949e;margin-top:4px">Choose your name to load active tickets</p>
    <div class="chef-grid" id="chef-grid">
       <!-- Pulled dynamically from Staff Database -->
    </div>
  </div>

  <div id="main-panel" style="display:none">
    <div class="header">
      <div style="display:flex; align-items:center; gap:12px;">
         <img src="input_file_1.jpeg" style="width:48px; height:48px; object-fit:contain; mix-blend-mode:multiply;" alt="🔥">
         <h1>👨‍🍳 Kitchen Prep Display</h1>
      </div>
      <div class="header-right">
        <button onclick="doSignOutChef()" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:4px 12px; border-radius:8px; font-size:11px; cursor:pointer; margin-right:8px;">↩ Switch Station</button>
        <span id="chef-badge" style="font-weight:700; color:black; background:white; padding:4px 12px; border-radius:8px; margin-right:8px;">Chef: —</span>
        <div class="queue-count" id="queue-count">0 dishes</div>
        <div id="user-badge" style="display:flex;align-items:center;gap:6px;"></div>
        <span id="hdr-time" style="opacity:.7"></span>
      </div>
    </div>

    <div class="layout">
      <!-- QUEUE -->
      <div class="queue-panel">
        <div class="queue-title">Dish Queue</div>
        <div id="queue-list">
          <div class="queue-empty">
            <div class="queue-empty-icon">⏳</div>
            Loading orders…
          </div>
        </div>
      </div>

      <!-- RECIPE INTERACTIVE BOARD -->
      <div class="recipe-panel" id="recipe-panel">
        <div class="no-selection">
          <div class="ns-icon">👈</div>
          <div class="ns-title">Select a dish from the queue</div>
          <p style="font-size:14px;margin-top:6px">Tap any dish to see step-by-step recipe</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="loading-placeholder" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;font-family:sans-serif;background:#0d1117;color:#e6edf3;">
  <div style="font-size:40px">👨‍🍳</div>
  <div style="font-size:16px;font-weight:700">Prep Display</div>
  <div style="font-size:13px;color:#888">Verifying chef station...</div>
</div>

<script>
// ── STATE ──
var STATE = {
  currentChef : null,
  staff       : [],
  queue       : [],
  selected    : null,  
  recipe      : null,  
  doneSteps   : [],    
  timers      : {}, // Parallel multi-timer tracker indexed by "orderId|dishName"
  selectedKey : null, // Current active focused selection key
  globalIntervalId: null,
  queueIntervalId: null, // Poll ID to auto-load new dishes
  gateState: "none",
};

var DEMO_QUEUE = [
  { orderId:"ORD-001", table:3, dish:"Burger Deluxe",    qty:2, note:"No onions on one", urgency:"high" },
  { orderId:"ORD-001", table:3, dish:"Spring Rolls",     qty:1, note:"",                 urgency:"high" },
  { orderId:"ORD-002", table:5, dish:"Steak",            qty:1, note:"Medium rare",      urgency:"med"  },
  { orderId:"ORD-002", table:5, dish:"Pasta Carbonara",  qty:1, note:"",                 urgency:"med"  },
];

var FALLBACK_RECIPES = {
  "Burger Deluxe":{
    prepTime:"5 min",cookTime:"12 min",difficulty:"Easy",
    ingredients:[
      {name:"Beef patty (180g)",amount:"1 pc"},{name:"Brioche bun",amount:"1 pc"},
      {name:"Cheddar cheese",amount:"2 slices"},{name:"Lettuce",amount:"2 leaves"},
      {name:"Tomato",amount:"2 slices"},{name:"Special sauce",amount:"1 tbsp"},
      {name:"Fries (frozen)",amount:"150g"}
    ],
    steps:[
      {title:"Prep Ingredients",   description:"Slice tomatoes and lettuce. Pat patty dry. Season both sides with salt and pepper.",timerSec:120,  tip:"Patty at room temp for even cooking."},
      {title:"Cook Fries",         description:"Place fries in fryer at 180°C. Shake halfway through.",                               timerSec:300,  tip:"Don't overcrowd the basket!"},
      {title:"Grill the Patty",    description:"Place on hot grill. DO NOT move. Cook 4 min first side without moving.",              timerSec:240,  tip:"Resist pressing — keeps juices in."},
      {title:"Add Cheese & Toast", description:"Add cheese on patty. Place bun face-down on grill. Wait until melted.",               timerSec:60,   tip:null},
      {title:"Assemble & Serve",   description:"Bottom bun → sauce → lettuce → tomato → patty → pickles → top bun.",                 timerSec:45,   tip:"Serve immediately!"},
    ]
  },
  "Steak":{
    prepTime:"5 min",cookTime:"15 min",difficulty:"Medium",
    ingredients:[
      {name:"Ribeye steak (250g)",amount:"1 pc"},{name:"Butter",amount:"30g"},
      {name:"Garlic cloves",amount:"3 pcs"},{name:"Rosemary",amount:"2 sprigs"},
      {name:"Sea salt & pepper",amount:"To taste"},{name:"Olive oil",amount:"1 tbsp"}
    ],
    steps:[
      {title:"Bring to Room Temp",description:"Remove from fridge 15 min before. Pat dry with paper towel.",timerSec:900,tip:"Dry surface = better sear."},
      {title:"Season Generously", description:"Season all sides firmly with sea salt and black pepper.",      timerSec:30, tip:null},
      {title:"Heat Pan",          description:"Cast iron on highest heat 3 minutes until smoking.",           timerSec:180,tip:"Pan must be screaming hot."},
      {title:"Sear First Side",   description:"Place steak away from you. DO NOT MOVE. 2.5 min.",            timerSec:150,tip:"Look for deep brown crust."},
      {title:"Flip & Baste",      description:"Flip. Add butter, garlic, rosemary. Baste continuously.",     timerSec:120,tip:"Basting constantly = more flavour."},
      {title:"Rest the Steak",    description:"Remove from heat. Tent with foil. Rest 5 min — mandatory.",   timerSec:300,tip:"Never skip — juices redistribute."},
      {title:"Slice & Plate",     description:"Slice against the grain. Pour resting juices over.",          timerSec:45, tip:null},
    ]
  }
};

function tickClock() {
  var el = document.getElementById("hdr-time");
  if (el) el.textContent = new Date().toLocaleTimeString("en-GB");
}

function doSignOutChef() {
  stopTimer();
  if (STATE.queueIntervalId) {
    clearInterval(STATE.queueIntervalId);
    STATE.queueIntervalId = null;
  }
  STATE.currentChef = null;
  STATE.selected = null;
  STATE.recipe = null;
  STATE.selectedKey = null;
  document.getElementById("main-panel").style.display = "none";
  document.getElementById("chef-overlay").style.display = "flex";
  loadChefSelection();
}

function loadChefSelection() {
  var api = window.POS_GAPI || window.POS_API;
  var container = document.getElementById("chef-grid");
  if (!container) return;

  function renderGrid(names) {
    container.innerHTML = names.map(function(name) {
      return '<div class="chef-card" onclick="selectChef(\'' + name + '\')">' +
        '<div class="chef-avatar">' + name.charAt(0).toUpperCase() + '</div>' +
        '<div class="chef-name">' + name + '</div>' +
        '</div>';
    }).join("");
  }

  if (api && api.getSheetId()) {
    api.Staff.getAll().then(function(res) {
      if (res && res.data) {
        var chefs = res.data.filter(s => s.Status === "active" && s.Role !== "Driver").map(s => s.Name);
        renderGrid(chefs.length > 0 ? chefs : ["Emma Brown", "Tom Wilson", "John Chef"]);
      } else {
        renderGrid(["Emma Brown", "Tom Wilson", "John Chef"]);
      }
    }).catch(function() {
      renderGrid(["Emma Brown", "Tom Wilson", "John Chef"]);
    });
  } else {
    renderGrid(["Emma Brown", "Tom Wilson", "John Chef"]);
  }
}

function selectChef(name) {
  STATE.currentChef = name;
  document.getElementById("chef-badge").textContent = "Chef: " + name;
  document.getElementById("chef-overlay").style.display = "none";
  document.getElementById("main-panel").style.display = "block";
  
  startGlobalInterval();
  
  if (STATE.queueIntervalId) {
    clearInterval(STATE.queueIntervalId);
  }
  
  loadQueue();
  var pollMs = (window.POS_CONFIG && window.POS_CONFIG.POLL_MS) || 5000;
  STATE.queueIntervalId = setInterval(loadQueue, pollMs);
}

function loadQueue() {
  var api = window.POS_GAPI || window.POS_API;
  if (!api || !api.getSheetId()) { STATE.queue = DEMO_QUEUE; renderQueue(); return; }
  
  api.Orders.getAll().then(function(res) {
    var orders = (res && res.data) ? res.data : null;
    if (orders && orders.length > 0) {
      var activeOrders = orders.filter(function(o) {
        return o.Status === "new" || o.Status === "preparing";
      });
      STATE.queue = buildQueueFromOrders(activeOrders);
    } else {
      STATE.queue = DEMO_QUEUE;  
    }
    renderQueue();
  }).catch(function() {
    STATE.queue = DEMO_QUEUE;
    renderQueue();
  });
}

function buildQueueFromOrders(orders) {
  var items = [];
  orders.forEach(function(order) {
    try {
      var orderItems = typeof order.Items === "string"
        ? JSON.parse(order.Items) : (order.Items || []);
      orderItems.forEach(function(item) {
        // Prevent duplicate prep: Hide item if another chef has claimed it
        if (item.status === "preparing" && item.chef && item.chef !== STATE.currentChef) {
          return;
        }

        var elapsed = order.OrderTime
          ? (Date.now() - new Date(order.OrderTime).getTime()) / 60000 : 0;
        items.push({
          orderId : order.OrderID,
          table   : order.TableNumber,
          dish    : item.name || item.Name,
          qty     : item.quantity || item.qty || 1,
          note    : order.Notes || item.note || "",
          urgency : elapsed > 15 ? "high" : elapsed > 8 ? "med" : "low",
        });
      });
    } catch(e) {}
  });
  return items;
}

function renderQueue() {
  var el = document.getElementById("queue-list");
  if (!el) return;
  document.getElementById("queue-count").textContent = STATE.queue.length + " dishes";

  if (!STATE.queue.length) {
    el.innerHTML = '<div class="queue-empty"><div class="queue-empty-icon">✅</div><div>All caught up!</div></div>';
    return;
  }

  el.innerHTML = STATE.queue.map(function(item, idx) {
    var key = item.orderId + "|" + item.dish;
    var isActive = STATE.selectedKey === key;
    var backgroundTimer = STATE.timers[key];
    var timerBadgeHtml = "";

    if (backgroundTimer && backgroundTimer.running && backgroundTimer.remaining > 0) {
      var m = Math.floor(backgroundTimer.remaining / 60);
      var s = backgroundTimer.remaining % 60;
      timerBadgeHtml = '<div class="qi-timer-badge">🔥 Cook ' + String(m).padStart(2, "0") + ':' + String(s).padStart(2, "0") + '</div>';
    } else if (backgroundTimer && !backgroundTimer.running && backgroundTimer.remaining === 0) {
      timerBadgeHtml = '<div class="qi-timer-badge" style="background:#27ae60; color:white;">✅ Done</div>';
    }

    return '<div class="queue-item' + (isActive ? " active" : "") + '" onclick="selectDish(' + idx + ')">' +
      '<div class="qi-header">' +
        '<span class="qi-order">' + item.orderId + '</span>' +
        '<span class="qi-table">Table ' + item.table + '</span>' +
      '</div>' +
      '<div class="qi-dish">' +
        '<span class="urgency-dot urg-' + item.urgency + '"></span>' +
        item.qty + '× ' + item.dish +
      '</div>' +
      (item.note ? '<div class="qi-note">⚠️ ' + item.note + '</div>' : '') +
      timerBadgeHtml +
    '</div>';
  }).join("");
}

function selectDish(idx) {
  var item = STATE.queue[idx];
  if (!item) return;

  var key = item.orderId + "|" + item.dish;
  STATE.selectedKey = key;
  STATE.selected = item;
  STATE.doneSteps = [];
  STATE.recipe = null;

  var backgroundTimer = STATE.timers[key];
  renderQueue();

  document.getElementById("recipe-panel").innerHTML =
    '<div class="loading-recipe"><div class="loading-spin">⚙️</div>' +
    '<div>Loading recipe for ' + item.dish + '…</div></div>';

  var api = window.POS_GAPI || window.POS_API;
  api.Recipes.get(item.dish).then(function(res) {
    if (res && res.data && res.data.Steps) {
      var r = res.data;
      var steps = typeof r.Steps === "string" ? JSON.parse(r.Steps) : r.Steps;
      var ings  = typeof r.Ingredients === "string" ? JSON.parse(r.Ingredients) : (r.Ingredients || []);
      
      var parsedSteps = steps.map(function(step) {
        return {
          title: step.title || step.Title || "",
          description: step.description || step.Description || "",
          timerSec: parseInt(step.timerSec || step.TimerSec || 0, 10),
          tip: step.tip || step.Tip || ""
        };
      });

      STATE.recipe = {
        prepTime   : r.PrepTime   || "—",
        cookTime   : r.CookTime   || "—",
        difficulty : r.Difficulty || "—",
        ingredients: ings,
        steps      : parsedSteps,
      };
    } else {
      STATE.recipe = FALLBACK_RECIPES[item.dish] || null;
    }

    if (backgroundTimer) {
      renderRecipe();
    } else {
      STATE.gateState = "none";
      renderRecipe();
    }
  }).catch(function() {
    STATE.recipe = FALLBACK_RECIPES[item.dish] || null;
    renderRecipe();
  });
}

function playTickChime() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(1000, ctx.currentTime);
    gain.gain.setValueAtTime(0.04, ctx.currentTime);
    osc.start();
    osc.stop(ctx.currentTime + 0.12);
  } catch(e){}
}

function updateSheetToPreparing() {
  var api = window.POS_GAPI || window.POS_API;
  if (api && api.getSheetId() && STATE.selected) {
    api.getRows("Orders").then(function(rows) {
      var orderRow = rows.find(function(r) { return r.OrderID === STATE.selected.orderId; });
      if (orderRow) {
        var itemsArray = [];
        try { itemsArray = JSON.parse(orderRow.Items); } catch(e){}
        
        itemsArray = itemsArray.map(function(item) {
          if (item.name === STATE.selected.dish || item.Name === STATE.selected.dish) {
            item.chef = STATE.currentChef;
            item.status = "preparing";
          }
          return item;
        });

        api.Orders.update({
          orderId: STATE.selected.orderId,
          status: "preparing",
          items: itemsArray
        });
      }
    });
  }
}

function updateSheetToReady() {
  var api = window.POS_GAPI || window.POS_API;
  if (api && api.getSheetId() && STATE.selected) {
    api.getRows("Orders").then(function(rows) {
      var orderRow = rows.find(function(r) { return r.OrderID === STATE.selected.orderId; });
      if (orderRow) {
        var itemsArray = [];
        try { itemsArray = JSON.parse(orderRow.Items); } catch(e){}
        
        itemsArray = itemsArray.map(function(item) {
          if (item.name === STATE.selected.dish || item.Name === STATE.selected.dish) {
            item.status = "ready";
          }
          return item;
        });

        var allReady = itemsArray.every(function(item) {
          return item.status === "ready";
        });

        api.Orders.update({
          orderId: STATE.selected.orderId,
          status: allReady ? "ready" : "preparing",
          items: itemsArray
        });
      }
    });
  }
}

// ── HIGH PERFORMANCE GLOBAL PARALLEL DECENTCULATED MULTI-TIMER ──
function startGlobalInterval() {
  if (STATE.globalIntervalId) return;
  STATE.globalIntervalId = setInterval(function() {
    var stateUpdated = false;

    Object.keys(STATE.timers).forEach(function(key) {
      var t = STATE.timers[key];
      if (!t.running) return;

      var r = t.recipeData;
      if (!r) return;

      var currentStep = r.steps[t.currentStepIdx];
      
      if (currentStep.timerSec === 0) {
        return;
      }

      t.remaining--;
      stateUpdated = true;

      if (t.remaining <= 0) {
        var nextIdx = t.currentStepIdx + 1;
        if (nextIdx < r.steps.length) {
          t.currentStepIdx = nextIdx;
          t.remaining = r.steps[nextIdx].timerSec || 10;
          playTickChime();
        } else {
          t.remaining = 0;
          t.running = false;
        }
      }
    });

    if (stateUpdated) {
      renderQueue(); 
      if (STATE.selectedKey && STATE.timers[STATE.selectedKey]) {
        renderRecipe(); 
      }
    }
  }, 1000);
}

function handleStepAdvance() {
  var t = STATE.timers[STATE.selectedKey];
  if (!t) return;
  
  var nextIdx = t.currentStepIdx + 1;
  if (nextIdx < STATE.recipe.steps.length) {
    t.currentStepIdx = nextIdx;
    t.remaining = STATE.recipe.steps[nextIdx].timerSec;
    playTickChime();
  } else {
    t.remaining = 0;
    t.running = false;
  }
  renderRecipe();
}

function toggleAutoCooking() {
  var key = STATE.selectedKey;
  var backgroundTimer = STATE.timers[key];

  if (!backgroundTimer) {
    updateSheetToPreparing();
    STATE.timers[key] = {
      orderId: STATE.selected.orderId,
      dish: STATE.selected.dish,
      currentStepIdx: 0,
      remaining: STATE.recipe.steps[0].timerSec,
      running: true,
      recipeData: STATE.recipe,
      gateState: "focus_cooking"
    };
  } else {
    var currentStep = STATE.recipe.steps[backgroundTimer.currentStepIdx];
    if (currentStep.timerSec > 0) {
      backgroundTimer.running = !backgroundTimer.running;
    }
  }
  renderRecipe();
}

function stopCookingTimer() {
  if (STATE.selectedKey) {
    delete STATE.timers[STATE.selectedKey];
  }
  renderRecipe();
}

function confirmRecipeFinished() {
  updateSheetToReady();
  if (STATE.selectedKey) {
    delete STATE.timers[STATE.selectedKey];
  }
  doSignOutChef();
}

function calculateTotalTimeRemaining(r, t) {
  if (!r || !t) return 0;
  var total = t.remaining;
  for (var i = t.currentStepIdx + 1; i < r.steps.length; i++) {
    total += r.steps[i].timerSec || 10; 
  }
  return total;
}

function renderRecipe() {
  var panel = document.getElementById("recipe-panel");
  var item  = STATE.selected;
  var r     = STATE.recipe;
  var key   = STATE.selectedKey;

  if (!panel) return;

  if (!r) {
    panel.innerHTML =
      '<div class="no-selection">' +
        '<div class="ns-icon">📋</div>' +
        '<div class="ns-title">No recipe for ' + item.dish + '</div>' +
        '<p style="font-size:13px;margin-top:8px">Add a recipe in Manager Portal → Menu → 📋 Recipe</p>' +
      '</div>';
    return;
  }

  var backgroundTimer = STATE.timers[key];
  var localGate = backgroundTimer ? backgroundTimer.gateState : STATE.gateState;

  // ── GATE 1: Hands Hygiene check ──
  if (localGate === "hygiene") {
    panel.innerHTML = `
      <div class="gate-modal">
        <div class="gate-card">
          <div class="gate-icon">🧼</div>
          <div class="gate-title">Hygiene Check</div>
          <div class="gate-sub">Chef ${STATE.currentChef}, please ensure your hands are washed and sanitized before preparing ${item.dish}.</div>
          <button class="gate-btn" onclick="STATE.gateState = 'ingredients'; renderRecipe();">✅ Yes, I Washed My Hands</button>
        </div>
      </div>`;
    return;
  }

  // ── GATE 2: Ingredients checklist check ──
  if (localGate === "ingredients") {
    panel.innerHTML = `
      <div class="gate-modal">
        <div class="gate-card" style="max-width:480px">
          <div class="gate-icon">🍳</div>
          <div class="gate-title">Mise En Place Check</div>
          <div class="gate-sub" style="margin-bottom:14px">Do you have all ingredients gathered for ${item.dish}?</div>
          
          <div class="ing-check-list">
            ${r.ingredients && r.ingredients.length 
              ? r.ingredients.map(ing => `
                <div class="ing-check-item">
                  <input type="checkbox" checked style="accent-color:#f39c12">
                  <span>${ing.amount} — <strong>${ing.name}</strong></span>
                </div>`).join("")
              : '<div style="color:#888; font-size:12px; padding:10px; text-align:center;">No ingredients listed</div>'
            }
          </div>
          
          <button class="gate-btn" onclick="toggleAutoCooking();">✅ Yes, Ready to Cook</button>
        </div>
      </div>`;
    return;
  }

  // ── TIMED FOCUS ACTIVE COOK VIEW (Hands-Free Step Tracking) ──
  if (localGate === "focus_cooking" && backgroundTimer) {
    var stepIdx = backgroundTimer.currentStepIdx;
    var currentStep = r.steps[stepIdx];
    var isTimerComplete = !backgroundTimer.running && backgroundTimer.remaining === 0 && (stepIdx === r.steps.length - 1);
    var isManualStep = currentStep.timerSec === 0;

    var rem = backgroundTimer.remaining;
    var m   = Math.floor(rem/60);
    var s   = rem % 60;
    var bigTimeDisp = String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");

    var totalTimeSec = calculateTotalTimeRemaining(r, backgroundTimer);
    var totM = Math.floor(totalTimeSec/60);
    var totS = totalTimeSec % 60;
    var totalTimeDisp = String(totM).padStart(2,"0") + ":" + String(totS).padStart(2,"0");

    panel.innerHTML = `
      <div class="focused-cooking-box">
        <!-- top control bar -->
        <div class="big-timer-box" style="margin-bottom:16px; background:#111420; display:flex; justify-content:space-between; align-items:center; padding:12px 24px;">
          <div style="text-align:left">
            <div class="bt-label" style="margin-bottom:2px">Interactive Multi-Cooking Dashboard</div>
            <div style="font-size:15px; color:#f39c12; font-weight:700;">${item.dish} · Table ${item.table}</div>
            <div style="font-size:12px; color:#8b949e; margin-top:2px;">⏱ Total Recipe Remaining: <strong>${totalTimeDisp}</strong></div>
          </div>
          
          <div style="display:flex; align-items:center; gap:20px;">
            <div class="bt-display ${rem <= 10 && !isManualStep && !isTimerComplete ? 'urgent' : isTimerComplete ? 'done-color' : ''}" style="font-size:38px; margin:0; font-family:'Courier New', monospace;">
              ${isManualStep ? "MANUAL" : isTimerComplete ? "🎉 DONE!" : bigTimeDisp}
            </div>
            
            <div class="bt-controls">
              ${isManualStep && !isTimerComplete
                ? `<button class="bt-ctrl" style="background:#f39c12; color:black; font-weight:800;" onclick="handleStepAdvance()">
                     ➡️ Next Step
                   </button>`
                : !isTimerComplete 
                  ? `<button class="bt-ctrl bt-pause" style="background:${backgroundTimer.running ? '#e74c3c' : '#27ae60'}; color:white;" onclick="toggleAutoCooking()">
                       ${backgroundTimer.running ? "⏸ Pause" : "▶ Resume"}
                     </button>` 
                  : `<button class="bt-ctrl" style="background:#27ae60; color:white; font-size:14px; padding:10px 20px;" onclick="confirmRecipeFinished()">
                       ✅ Confirm Finish
                     </button>`
              }
              <button class="bt-ctrl bt-stop" onclick="stopCookingTimer()">✕ Stop</button>
            </div>
          </div>
        </div>

        <!-- Big active instruction focused step -->
        <div class="focus-step-card">
          <span class="focus-step-num">Step ${stepIdx + 1} of ${r.steps.length} ${isManualStep ? "— Manual" : ""}</span>
          <div class="focus-step-title">${currentStep.title}</div>
          <div class="focus-step-desc">${currentStep.description}</div>
          ${currentStep.tip ? `<div class="focus-step-tip">💡 Chef Tip: ${currentStep.tip}</div>` : ""}
        </div>

        <!-- Next up preview timeline -->
        <div class="section-lbl">Recipe Steps Timeline</div>
        <div class="timeline-track">
          ${r.steps.map((st, i) => {
            var isSActive = i === stepIdx;
            var isSDone = i < stepIdx;
            return `
              <div class="timeline-step ${isSActive ? 'active' : isSDone ? 'done' : ''}">
                <div class="timeline-name">${i+1}. ${st.title}</div>
                <div style="font-size:9px; color:#888;">⏱ ${st.timerSec > 0 ? st.timerSec + "s" : "Manual"}</div>
              </div>`;
          }).join("")}
        </div>
      </div>`;
    return;
  }

  // ── Standard Fallback Recipe card View (if not cooking) ──
  var done     = STATE.doneSteps.length;
  var total    = r.steps.length;
  var pct      = total > 0 ? Math.round((done/total)*100) : 0;
  var nextStep = done < total ? done : -1;

  panel.innerHTML =
    '<div class="recipe-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #30363d; padding:18px 22px;">' +
      '<div>' +
        '<div class="recipe-title">' + item.qty + '× ' + item.dish + '</div>' +
        '<div class="recipe-meta">' +
          '<span>⏱ Prep: ' + r.prepTime + '</span>' +
          '<span>🔥 Cook: ' + r.cookTime + '</span>' +
          '<span>⭐ ' + r.difficulty + '</span>' +
          (item.note ? '<span style="color:#f39c12">⚠️ ' + item.note + '</span>' : '') +
          '<span class="' + (done===total&&total>0?"meta-ok":"meta-warn") + '">' +
            '✅ ' + done + '/' + total + ' steps done</span>' +
        '</div>' +
      '</div>' +
      '<div>' +
        '<button class="gate-btn" style="padding:12px 28px; font-size:14px; width:auto;" onclick="STATE.gateState = \'hygiene\'; renderRecipe();">🔥 START COOKING</button>' +
      '</div>' +
    '</div>' +
    '<div class="recipe-content">' +
      '<div class="steps-section">' +
        '<div class="section-lbl">Preparation Steps</div>' +
        r.steps.map(function(step, i) {
          var isDone   = STATE.doneSteps.indexOf(i) >= 0;
          var isActive = !isDone && i === nextStep;
          var cls      = isDone ? "s-done" : isActive ? "s-active" : "";
          var durText  = step.timerSec > 0
            ? Math.floor(step.timerSec/60) + "m" + (step.timerSec%60 ? " "+step.timerSec%60+"s" : "")
            : "Manual";
          return '<div class="step-card ' + cls + '">' +
            '<div class="step-header">' +
              '<div class="step-num">' + (isDone ? "✓" : (i+1)) + '</div>' +
              '<div class="step-title-text">' + step.title + '</div>' +
              '<div class="step-dur">⏱ ' + durText + '</div>' +
            '</div>' +
            '<div class="step-desc">' + step.description + '</div>' +
            (step.tip ? '<div class="step-tip">💡 ' + step.tip + '</div>' : '') +
            '<div class="step-actions">' +
              (isDone
                ? '<button class="undo-btn" onclick="undoStep(' + i + ')">↩ Undo</button>'
                : '<button class="done-btn" onclick="markDone(' + i + ')">✓ Done</button>') +
            '</div>' +
          '</div>';
        }).join("") +
      '</div>' +
      '<div class="side-panel">' +
        '<div class="section-lbl">Ingredients</div>' +
        (r.ingredients && r.ingredients.length
          ? r.ingredients.map(function(ing){
              return '<div class="ing-row"><span class="ing-name">' + ing.name + '</span>' +
                     '<span class="ing-amt">' + ing.amount + '</span></div>';
            }).join("")
          : '<div class="no-recipe-box"><p>No ingredients listed.</p></div>') +
      '</div>' +
    '</div>';
}

function markDone(i) {
  if (STATE.doneSteps.indexOf(i) < 0) STATE.doneSteps.push(i);
  renderRecipe();
}

function undoStep(i) {
  STATE.doneSteps = STATE.doneSteps.filter(function(d){ return d !== i; });
  renderRecipe();
}

function stopTimer() {
  if (STATE.activeTimer) {
    clearInterval(STATE.activeTimer.intervalId);
    STATE.activeTimer = null;
    STATE.gateState = "none";
  }
}
</script>

<script>
(function() {
  function startAuth() {
    if (typeof POS_AUTH === "undefined") {
      console.error("POS_AUTH failed to load");
      return;
    }
    POS_AUTH.init("kitchen-prep-display", {
      onReady: function(session) {
        var root = document.getElementById("app");
        if (root) root.style.display = "block";
        var loader = document.getElementById("loading-placeholder");
        if (loader) loader.style.display = "none";

        tickClock();
        setInterval(tickClock, 1000);
        loadChefSelection();

        setTimeout(function() {
          if (typeof POS_AUTH.renderUtilBar === "function") {
            POS_AUTH.renderUtilBar("user-badge", "kitchen-prep-display");
          }
        }, 500);
      },
      onError: function(msg) { console.error("Auth error:", msg); }
    });
  }

  if (typeof POS_AUTH !== "undefined") {
    startAuth();
  } else {
    var tries = 0;
    var iv = setInterval(function() {
      tries++;
      if (typeof POS_AUTH !== "undefined") { clearInterval(iv); startAuth(); }
      else if (tries > 50) { clearInterval(iv); startAuth(); }
    }, 100);
  }
})();
</script>
