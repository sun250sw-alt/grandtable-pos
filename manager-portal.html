    function RotaManager() {
      const today  = new Date();
      const monday = new Date(today);
      monday.setDate(today.getDate() - ((today.getDay()+6)%7));

      const [weekOffset, setWeekOffset] = useState(0);
      const [rota, setRota]             = useState({});
      const [showModal, setShowModal]   = useState(false);
      const [editCell, setEditCell]     = useState(null);
      const [form, setForm]             = useState({ start:"09:00", end:"17:00", role:"Waiter", notes:"" });
      const [staffNames, setStaffNames] = useState([]);

      const loadRotaAndStaff = async () => {
        if (!window.POS_GAPI || !window.POS_GAPI.getSheetId()) return;
        try {
          const staffRes = await window.POS_GAPI.Staff.getAll();
          if (staffRes && staffRes.data) {
              const activeNames = staffRes.data
                .filter(s => s !== null && s !== undefined && s.Name && s.Status === "active")
                .map(s => s.Name);
              setStaffNames(activeNames);
          }

          const rotaRes = await window.POS_GAPI.getRows("Rota");
          if (rotaRes) {
              const map = {};
              rotaRes.filter(r => r !== null && r !== undefined).forEach(r => {
                const key = r.StaffName + "|" + r.Date;
                map[key] = {
                  id: r.RotaID,
                  start: r.ShiftStart,
                  end: r.ShiftEnd,
                  role: r.Role,
                  notes: r.Notes || "",
                  status: r.Status || "confirmed"
                };
              });
              setRota(map);
          }
        } catch(e) { console.error("Rota load error:", e); }
      };

      useEffect(() => {
        loadRotaAndStaff();
        const pollMs = (window.POS_CONFIG && window.POS_CONFIG.POLL_MS) || 5000;
        const iv = setInterval(loadRotaAndStaff, pollMs);
        return () => clearInterval(iv);
      }, []);

      function getWeekDates() {
        return DAYS.map((_,i) => {
          const d = new Date(monday);
          d.setDate(monday.getDate() + weekOffset*7 + i);
          return d;
        });
      }

      const weekDates = getWeekDates();
      const weekLabel = `${weekDates[0] && !isNaN(weekDates[0].getTime()) ? weekDates[0].toLocaleDateString("en-GB",{day:"numeric",month:"short"}) : ""} – ${weekDates[6] && !isNaN(weekDates[6].getTime()) ? weekDates[6].toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : ""}`;

      function cellKey(staff, date) {
        const parsedDateStr = (date && !isNaN(date.getTime())) ? date.toISOString().split("T")[0] : "undefined";
        return staff + "|" + parsedDateStr;
      }

      function openCell(staff, date) {
        const key      = cellKey(staff, date);
        const existing = rota[key];
        setEditCell({ staff, date, key });
        setForm(existing || { start:"09:00", end:"17:00", role:"Waiter", notes:"" });
        setShowModal(true);
      }

      const saveShift = async () => {
        if (!editCell) return;
        const existing = rota[editCell.key];
        try {
            if (window.POS_GAPI && window.POS_GAPI.getSheetId()) {
                const dateStr = editCell.date.toISOString().split("T")[0];
                if (existing && existing.id) {
                    await window.POS_GAPI.updateRow("Rota", 0, existing.id, {
                        ShiftStart: form.start,
                        ShiftEnd: form.end,
                        Role: form.role,
                        Notes: form.notes
                    });
                } else {
                    const id = window.POS_GAPI.uid("ROT");
                    await window.POS_GAPI.appendRow("Rota", [
                        id, "", editCell.staff, dateStr, form.start, form.end, form.role, "", form.notes, "confirmed"
                    ]);
                }
                await loadRotaAndStaff();
                setShowModal(false);
            }
        } catch(e) { alert("Failed to save shift: " + e.message); }
      };

      const clearShift = async () => {
        if (!editCell || !rota[editCell.key]) return;
        const existing = rota[editCell.key];
        try {
            if (window.POS_GAPI && window.POS_GAPI.getSheetId() && existing.id) {
                await window.POS_GAPI.deleteRow("Rota", 0, existing.id);
                await loadRotaAndStaff();
                setShowModal(false);
            }
        } catch(e) { alert("Failed to clear shift: " + e.message); }
      };

      function calcH(start, end) {
        if (!start || !end || !start.includes(":") || !end.includes(":")) return 0;
        const [sh,sm] = start.split(":").map(Number);
        const [eh,em] = end.split(":").map(Number);
        return +((eh*60+em-sh*60-sm)/60).toFixed(1);
      }

      const todayStr = new Date().toISOString().split("T")[0];
      const activeStaffRender = staffNames.length > 0 ? staffNames : ROTA_STAFF;

      return (
        <>
          <div className="table-card" style={{ marginBottom:"16px" }}>
            <div className="table-card-header">
              <div style={{ display:"flex", alignItems:"center", gap:"12px" }}>
                <button className="btn btn-ghost" style={{padding:"6px 14px"}} onClick={()=>setWeekOffset(w=>w-1)}>‹ Prev</button>
                <div className="table-card-title">📅 {weekLabel}</div>
                <button className="btn btn-ghost" style={{padding:"6px 14px"}} onClick={()=>setWeekOffset(w=>w+1)}>Next ›</button>
              </div>
              <div style={{ display:"flex", gap:"8px" }}>
                <button className="btn btn-ghost" onClick={()=>setWeekOffset(0)}>This Week</button>
                <button className="btn btn-primary">Publish Rota</button>
              </div>
            </div>
            <div style={{ overflowX:"auto" }}>
              <table className="data-table" style={{ minWidth:"700px" }}>
                <thead>
                  <tr>
                    <th style={{width:"120px"}}>Staff</th>
                    {weekDates.map((d,i) => {
                      const str = (d && !isNaN(d.getTime())) ? d.toISOString().split("T")[0] : "";
                      const isToday = str === todayStr;
                      return (
                        <th key={i} style={{ textAlign:"center", background: isToday?"#f0f0ff":"", minWidth:"90px" }}>
                          <div>{DAYS[i]}</div>
                          <div style={{ fontWeight:400, color:"#aaa", fontSize:"11px" }}>
                            {d && !isNaN(d.getTime()) ? d.toLocaleDateString("en-GB",{day:"numeric",month:"short"}) : ""}
                          </div>
                        </th>
                      );
                    })}
                    <th>Total</th>
                  </tr>
                </thead>
                <tbody>
                  {activeStaffRender.map(staff => {
                    let totalHrs = 0;
                    return (
                      <tr key={staff}>
                        <td><strong style={{fontSize:"13px"}}>{staff}</strong></td>
                        {weekDates.map((date,i) => {
                          const key   = cellKey(staff,date);
                          const shift = rota[key];
                          if (shift) totalHrs += calcH(shift.start, shift.end);
                          return (
                            <td key={i} style={{ textAlign:"center", padding:"6px", cursor:"pointer" }}
                                onClick={()=>openCell(staff,date)}>
                              {shift
                                ? <div style={{ background:"#eef0ff", borderRadius:"8px", padding:"6px 4px",
                                                borderLeft:"3px solid #667eea", fontSize:"11px" }}>
                                    <div style={{ fontWeight:700, color:"#1a1a2e" }}>
                                      {shift.start || "09:00"}–{shift.end || "17:00"}
                                    </div>
                                    <div style={{ color:"#667eea" }}>{calcH(shift.start,shift.end)}h</div>
                                  </div>
                                : <div style={{ background:"#f9f9f9", borderRadius:"8px", padding:"6px",
                                                color:"#ddd", fontSize:"11px" }}>+ Add</div>
                              }
                            </td>
                          );
                        })}
                        <td style={{ fontWeight:700, color:"#667eea", textAlign:"center" }}>
                          {totalHrs > 0 ? totalHrs.toFixed(1)+"h" : "—"}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {showModal && editCell && (
            <div className="modal-overlay">
              <div className="modal">
                <h3>
                  {editCell.staff} — {editCell.date && !isNaN(editCell.date.getTime()) ? editCell.date.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"}) : ""}
                </h3>
                <div className="form-grid">
                  <div className="form-group">
                    <label>Shift Start</label>
                    <input type="time" value={form.start || "09:00"} onChange={e=>setForm({...form,start:e.target.value})}/>
                  </div>
                  <div className="form-group">
                    <label>Shift End</label>
                    <input type="time" value={form.end || "17:00"} onChange={e=>setForm({...form,end:e.target.value})}/>
                  </div>
                  <div className="form-group" style={{gridColumn:"1/-1"}}>
                    <label>Role / Station</label>
                    <select value={form.role || "Waiter"} onChange={e=>setForm({...form,role:e.target.value})}>
                      <option>Waiter</option><option>Chef</option><option>Bar</option>
                      <option>Host</option><option>Manager</option><option>Kitchen</option>
                    </select>
                  </div>
                  <div className="form-group" style={{gridColumn:"1/-1"}}>
                    <label>Notes (optional)</label>
                    <input value={form.notes || ""} onChange={e=>setForm({...form,notes:e.target.value})}
                           placeholder="e.g. Cover for Sarah, training shift"/>
                  </div>
                </div>
                <div style={{ background:"#f0f0ff", borderRadius:"8px", padding:"10px 14px",
                              fontSize:"13px", color:"#667eea", marginBottom:"16px" }}>
                  ⏱ Duration: <strong>{calcH(form.start,form.end)} hours</strong>
                </div>
                <div className="modal-actions">
                  {rota[editCell.key] &&
                    <button className="btn btn-danger" onClick={clearShift}>Remove Shift</button>}
                  <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
                  <button className="btn btn-primary" onClick={saveShift}>Save Shift</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    function TeamClockings() {
      const [clockings, setClockings] = useState([]);
      const [search, setSearch]       = useState("");

      const loadClockings = async () => {
         if (!window.POS_GAPI || !window.POS_GAPI.getSheetId()) return;
         try {
             const res = await window.POS_GAPI.getRows("Clockings");
             if (res) {
                 setClockings(res.filter(c => c !== null && c !== undefined));
             }
         } catch(e) { console.error("Load clocking error:", e); }
      };

      useEffect(() => {
         loadClockings();
         const iv = setInterval(loadClockings, 5000);
         return () => clearInterval(iv);
      }, []);

      const filtered = clockings.filter(c =>
        (c.StaffName || "").toLowerCase().includes(search.toLowerCase())
      );

      return (
        <div className="table-card">
          <div className="table-card-header">
            <div className="table-card-title">All Staff Clockings</div>
            <input className="search-input" placeholder="🔍 Search staff..."
                   value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <table className="data-table">
            <thead>
              <tr><th>Staff</th><th>Date</th><th>Clock In</th><th>Clock Out</th><th>Hours</th><th>Status</th></tr>
            </thead>
            <tbody>
              {filtered.map((c,i)=>(
                <tr key={i}>
                  <td><strong>{c.StaffName || c.StaffEmail}</strong></td>
                  <td>{c.Date ? new Date(c.Date).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}) : "—"}</td>
                  <td style={{color:"#27ae60",fontWeight:700}}>{c.ClockIn || "—"}</td>
                  <td style={{color:"#e74c3c",fontWeight:700}}>{c.ClockOut || "—"}</td>
                  <td style={{fontWeight:700}}>{parseFloat(c.TotalHours) > 0 ? parseFloat(c.TotalHours).toFixed(2)+" hrs":"Working…"}</td>
                  <td>
                    <span className={`badge ${c.Status==="out"?"badge-green":"badge-yellow"}`}>
                      {c.Status==="out"?"✅ Complete":"🟡 Active"}
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function SettingsPage({ toast }) {
        const [form, setForm] = useState({ name: "", currency: "LKR", tax: "10", delivery: "250", pin: "1234" });
        const [saving, setSaving] = useState(false);

        const loadSettings = async () => {
            if (!window.POS_GAPI) return;
            try {
                const settings = window.POS_GAPI.getSettings() || {};
                setForm({
                    name: settings.restaurant_name || "",
                    currency: settings.currency || "LKR",
                    tax: String((parseFloat(settings.tax_rate) || 0.10) * 100),
                    delivery: String(settings.delivery_fee || "250"),
                    pin: settings.admin_pin || "1234"
                });
            } catch(e) { console.error("Load settings page error:", e); }
        };

        useEffect(() => {
            loadSettings();
        }, []);

        const handleSave = async () => {
            if (!form.name || !form.pin) { alert("Restaurant Name and PIN are required"); return; }
            if (form.pin.replace(/\D/g, "").length !== 4) { alert("PIN must be exactly 4 digits"); return; }
            
            setSaving(true);
            try {
                if (window.POS_GAPI && window.POS_GAPI.getSheetId()) {
                    await window.POS_GAPI.Settings.update({
                        restaurant_name: form.name,
                        currency: form.currency,
                        tax_rate: String(parseFloat(form.tax) / 100),
                        delivery_fee: form.delivery,
                        admin_pin: form.pin
                    });
                    toast("⚙️ Settings updated successfully!");
                }
            } catch(e) { alert("Failed to save settings: " + e.message); }
            setSaving(false);
        };

        return (
            <div className="table-card" style={{ padding: "28px" }}>
                <div className="table-card-header" style={{ borderBottom: "1px solid #f0f0f0", paddingBottom: "14px", marginBottom: "20px" }}>
                    <div className="table-card-title">⚙️ Restaurant Preferences</div>
                </div>
                <div className="form-grid settings-grid" style={{ maxWidth: "600px" }}>
                    <div className="form-group" style={{ gridColumn: "1/-1" }}>
                        <label>Restaurant Name</label>
                        <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="e.g. The Grand Table" />
                    </div>
                    <div className="form-group">
                        <label>Currency Symbol / Code</label>
                        <input value={form.currency} onChange={e => setForm({ ...form, currency: e.target.value })} placeholder="LKR" />
                    </div>
                    <div className="form-group">
                        <label>Tax Rate (%)</label>
                        <input type="number" min="0" max="50" value={form.tax} onChange={e => setForm({ ...form, tax: e.target.value })} placeholder="10" />
                    </div>
                    <div className="form-group">
                        <label>Delivery Fee</label>
                        <input type="number" min="0" value={form.delivery} onChange={e => setForm({ ...form, delivery: e.target.value })} placeholder="250" />
                    </div>
                    <div className="form-group">
                        <label>🔐 Manager Access PIN (4 digits)</label>
                        <input type="password" maxLength="4" value={form.pin} onChange={e => setForm({ ...form, pin: e.target.value.replace(/\D/g, "") })} placeholder="1234" />
                    </div>
                </div>
                <div style={{ borderTop: "1px solid #f0f0f0", marginTop: "24px", paddingTop: "20px", maxWidth: "600px" }}>
                    <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
                        {saving ? "Saving Preferences..." : "Save Settings"}
                    </button>
                </div>
            </div>
        );
    }

    const ROTA_STAFF = ["John Doe","Sarah Lee","Mike Chen","Emma Brown","Tom Wilson"];
    const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

    const NAV = [
        { icon: "📊", label: "Dashboard", section: "overview" },
        { icon: "📋", label: "Menu Management", section: "menu" },
        { icon: "📦", label: "Inventory", section: "inventory" },
        { icon: "👥", label: "Staff", section: "staff" },
        { icon: "📅", label: "Rota Manager", section: "rota" },
        { icon: "🕐", label: "Team Clockings", section: "clockings" },
        { icon: "⚙️", label: "Settings", section: "settings" }
    ];

    function ManagerPortal() {
        const [active, setActive] = useState("overview");
        const [toastMsg, setToastMsg] = useState("");

        const triggerToast = (msg) => {
            setToastMsg(msg);
            setTimeout(() => setToastMsg(""), 3000);
        };

        const titles = { 
          overview: { title: "Dashboard", sub: "Live database analysis" }, 
          menu: { title: "Menu Management", sub: "Add, edit, and delete dishes" }, 
          inventory: { title: "Inventory", sub: "Track and manage stock levels" }, 
          staff: { title: "Staff Management", sub: "Add or delete team members" }, 
          rota: { title: "Rota Manager", sub: "Build and publish staff schedules" }, 
          clockings: { title: "Team Clockings", sub: "View all staff clock in/out records" },
          settings: { title: "Settings", sub: "Configure restaurant preferences and security" }
        };

        return (
            <div className="layout">
                <div className="sidebar">
                    <div className="sidebar-logo">🍽️ The Grand Table <span>Manager Portal</span></div>
                    <div className="nav-section">Main</div>
                    {NAV.map(n => (
                        <div key={n.section} className={`nav-item ${active === n.section ? 'active' : ''}`} onClick={() => setActive(n.section)}>
                            <span className="icon">{n.icon}</span>{n.label}
                        </div>
                    ))}
                    <div className="sidebar-bottom" style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                        <div id="user-badge" style={{ fontSize: '12px', color: 'rgba(255,255,255,.5)' }}></div>
                        <div style={{ display: 'flex', gap: '6px' }}>
                            <button onClick={() => { if (window.POS_AUTH) window.POS_AUTH.openSheet(); }}
                              style={{
                                flex: 1,
                                background: "rgba(39,174,96,.15)",
                                border: "1px solid rgba(39,174,96,.3)",
                                color: "#27ae60",
                                padding: "6px",
                                borderRadius: "8px",
                                fontSize: "11px",
                                fontWeight: 700,
                                cursor: "pointer"
                              }}>
                              📊 Sheet
                            </button>
                            <button onClick={() => location.reload()}
                              style={{
                                flex: 1,
                                background: "rgba(255,255,255,.08)",
                                border: "1px solid rgba(255,255,255,.1)",
                                color: "rgba(255,255,255,.5)",
                                padding: "6px",
                                borderRadius: "8px",
                                fontSize: "11px",
                                fontWeight: 700,
                                cursor: "pointer"
                              }}>
                              🔄 Refresh
                            </button>
                        </div>
                    </div>
                </div>
                <div className="main">
                    <div className="page-header">
                        <div>
                            <div className="page-title">{titles[active].title}</div>
                            <div className="page-subtitle">{titles[active].sub}</div>
                        </div>
                    </div>
                    <div className="page-content">
                        {active === "overview" && <Dashboard />}
                        {active === "menu" && <MenuManagement toast={triggerToast} />}
                        {active === "inventory" && <Inventory />}
                        {active === "staff" && <StaffWithDrivers toast={triggerToast} />}
                        {active === "rota" && <RotaManager />}
                        {active === "clockings" && <TeamClockings />}
                        {active === "settings" && <SettingsPage toast={triggerToast} />}
                    </div>
                </div>
                {toastMsg && <div className="notification-toast">{toastMsg}</div>}
            </div>
        );
    }

    window._doRenderPortal = function() { 
        ReactDOM.createRoot(document.getElementById('root')).render(<ManagerPortal />); 
    };
</script>

<script>
// Manager portal auth: PIN required, React renders only after PIN verified
(function() {
  document.getElementById("root").innerHTML =
    '<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;' +
    'background:#f0f2f5;flex-direction:column;gap:16px;font-family:sans-serif;">' +
    '<div style="font-size:48px">🍽️</div>' +
    '<div style="font-size:20px;font-weight:700;color:#667eea">Manager Portal</div>' +
    '<div style="font-size:14px;color:#888" id="mp-status">Checking auth...</div>' +
    '</div>';

  function setStatus(msg) {
    var el = document.getElementById("mp-status");
    if (el) el.textContent = msg;
  }

  function boot() {
    if (typeof POS_AUTH === "undefined" || typeof POS_GAPI === "undefined") {
      setStatus("Loading scripts...");
      setTimeout(boot, 200); return;
    }

    setStatus("Checking session...");

    var savedRaw = localStorage.getItem("pos_session");
    if (!savedRaw) {
      window.location.href = "index.html?redirect=" + encodeURIComponent(location.href);
      return;
    }

    POS_GAPI.loadLibraries().then(function() {
      setStatus("Signing in...");
      POS_GAPI.silentSignIn(function(session) {
        if (!session) {
          window.location.href = "index.html?redirect=" + encodeURIComponent(location.href);
          return;
        }
        POS_GAPI.initUserSheet().catch(function(){}).then(function() {
          setStatus("Verifying PIN...");
          showPinModal(session);
        });
      });
    }).catch(function(e) {
      setStatus("Error loading Google APIs: " + e.message);
    });
  }

  function showPinModal(session) {
    document.getElementById("root").innerHTML =
      '<div style="position:fixed;inset:0;background:rgba(7,7,15,.97);display:flex;' +
      'align-items:center;justify-content:center;z-index:9999;font-family:-apple-system,sans-serif;">' +
      '<div style="background:#111827;border:1px solid rgba(255,255,255,.1);border-radius:24px;' +
      'padding:40px 32px;width:320px;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,.7);">' +
      '<div style="font-size:48px;margin-bottom:14px">🔐</div>' +
      '<h2 style="color:#fff;font-size:20px;font-weight:800;margin-bottom:6px">Manager Access</h2>' +
      '<p style="color:rgba(255,255,255,.4);font-size:13px;margin-bottom:28px">' +
        session.name + '<br>Enter your 4-digit PIN</p>' +
      '<div style="display:flex;justify-content:center;gap:14px;margin-bottom:28px" id="pin-dots">' +
        [0,1,2,3].map(function(i){ return '<div id="pd'+i+'" style="width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:transparent;transition:all .15s"></div>'; }).join('') +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">' +
        [1,2,3,4,5,6,7,8,9,"","0","⌫"].map(function(k){
          return '<button data-k="'+k+'" style="padding:15px 0;border-radius:12px;border:1px solid rgba(255,255,255,.08);' +
            'background:rgba(255,255,255,.05);color:#fff;font-size:20px;font-weight:600;cursor:pointer;' +
            (k===""?"opacity:0;pointer-events:none;":"") + '" ' +
            'onmousedown="this.style.background=\'rgba(243,156,18,.25)\'" ' +
            'onmouseup="this.style.background=\'rgba(255,255,255,.05)\'">' + k + '</button>';
        }).join('') +
      '</div>' +
      '<div id="pin-err" style="color:#e74c3c;font-size:13px;min-height:18px;margin-bottom:12px"></div>' +
      '<button onclick="localStorage.removeItem(\'pos_session\');location.href=\'index.html\'" ' +
        'style="background:none;border:none;color:rgba(255,255,255,.25);font-size:12px;cursor:pointer;">Sign out</button>' +
      '</div></div>';

    var entered = "";
    function updateDots() {
      [0,1,2,3].forEach(function(i) {
        var d = document.getElementById("pd"+i);
        if (!d) return;
        d.style.background  = i < entered.length ? "#f39c12" : "transparent";
        d.style.borderColor = i < entered.length ? "#f39c12" : "rgba(255,255,255,.2)";
      });
    }

    document.querySelectorAll("[data-k]").forEach(function(btn) {
      var k = btn.dataset.k;
      if (!k) return;
      btn.addEventListener("click", function() {
        if (k === "⌫") { entered = entered.slice(0,-1); document.getElementById("pin-err").textContent=""; updateDots(); return; }
        if (entered.length >= 4) return;
        entered += k; updateDots();
        if (entered.length === 4) {
          POS_GAPI.Settings.verifyPin(entered).then(function(res) {
            if (res && res.data && res.data.verified) {
              document.getElementById("root").innerHTML = "";
              if (typeof window._doRenderPortal === "function") {
                window._doRenderPortal();
              }
              setTimeout(function() {
                if (typeof POS_AUTH !== "undefined" && typeof POS_AUTH.renderUtilBar === "function") {
                  POS_AUTH.renderUtilBar("user-badge","manager-portal");
                }
              }, 600);
            } else {
              document.getElementById("pin-err").textContent = "Incorrect PIN — try again";
              entered = ""; updateDots();
            }
          }).catch(function() {
            if (entered === "1234") {
              document.getElementById("root").innerHTML = "";
              if (typeof window._doRenderPortal === "function") window._doRenderPortal();
            } else {
              document.getElementById("pin-err").textContent = "Incorrect PIN — try again";
              entered = ""; updateDots();
            }
          });
        }
      });
    });
  }

  var attempts = 0;
  var iv = setInterval(function() {
    attempts++;
    if (typeof POS_AUTH !== "undefined" && typeof POS_GAPI !== "undefined") {
      clearInterval(iv); boot();
    } else if (attempts > 60) {
      clearInterval(iv);
      setStatus("Error: pos-config.js not loading. Upload it to GitHub.");
    }
  }, 100);
})();
</script>
</body>
</html>
